openapi: "3.1.0"
info:
  title: Api
  version: "1.0.0"
servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "409":
          description: Username already taken

  /auth/login:
    post:
      operationId: login
      summary: Login with username and secret key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      summary: Logout current user
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users/profile:
    patch:
      operationId: updateProfile
      summary: Update user profile (display name, avatar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/avatar:
    post:
      operationId: uploadAvatar
      summary: Upload profile avatar image (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUpload"
      responses:
        "200":
          description: Avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"

  /rooms:
    get:
      operationId: listRooms
      summary: List rooms the current user participates in
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      summary: Create or join a private room by name and secret key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "200":
          description: Room joined or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{roomId}:
    get:
      operationId: getRoom
      summary: Get room details
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Access denied
        "404":
          description: Not found

  /rooms/{roomId}/messages:
    get:
      operationId: getMessages
      summary: Get message history for a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          description: Access denied

  /rooms/{roomId}/messages/image:
    post:
      operationId: sendImageMessage
      summary: Send an image message in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageMessageInput"
      responses:
        "201":
          description: Image message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    RegisterInput:
      type: object
      required: [username, secretKey]
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 30
        secretKey:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [username, secretKey]
      properties:
        username:
          type: string
        secretKey:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        displayName:
          type: ["string", "null"]

    AvatarUpload:
      type: object
      required: [imageData]
      properties:
        imageData:
          type: string
          description: Base64-encoded image data URL

    AvatarResponse:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    RoomInput:
      type: object
      required: [name, secretKey]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        secretKey:
          type: string
          minLength: 4

    Room:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        participantCount:
          type: ["integer", "null"]

    Message:
      type: object
      required: [id, roomId, senderId, type, createdAt]
      properties:
        id:
          type: integer
        roomId:
          type: integer
        senderId:
          type: integer
        senderUsername:
          type: ["string", "null"]
        senderAvatarUrl:
          type: ["string", "null"]
        type:
          type: string
          enum: [text, image]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ImageMessageInput:
      type: object
      required: [imageData]
      properties:
        imageData:
          type: string
          description: Base64-encoded image data URL
