kind = "web"
previewPath = "/"
title = "Arcaidron"
version = "1.0.0"
id = "artifacts/arcaidron"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18207

[services.development]
run = "pnpm --filter @workspace/arcaidron run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arcaidron", "run", "build" ]
publicDir = "artifacts/arcaidron/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18207"
BASE_PATH = "/"
