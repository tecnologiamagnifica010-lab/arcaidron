<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ARCAIDRON</title>
    <meta name="theme-color" content="#030814" />
    <link rel="manifest" href="/public/manifest.json" />
    <script src="/socket.io/socket.io.js"></script>
    <style>
      :root {
        --bg: #020712;
        --panel: rgba(6, 19, 37, 0.92);
        --panel2: rgba(10, 32, 62, 0.78);
        --line: rgba(55, 143, 255, 0.46);
        --text: #f4f9ff;
        --muted: #91a9c6;
        --blue: #0b8cff;
        --cyan: #42e8ff;
        --violet: #7c3cff;
        --red: #ff3d63;
        --green: #20e070;
        --shadow: 0 0 30px rgba(0, 132, 255, 0.34);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, Arial, system-ui, sans-serif;
        background:
          radial-gradient(circle at 50% -10%, rgba(0, 132, 255, 0.28), transparent 36%),
          radial-gradient(circle at 85% 24%, rgba(123, 60, 255, 0.2), transparent 26%),
          linear-gradient(180deg, #020814, #00040b);
        color: var(--text);
        overflow: hidden;
      }
      button, input { font: inherit; }
      button { cursor: pointer; }
      .hidden { display: none !important; }
      .appShell { width: min(940px, 100vw); height: 100dvh; margin: 0 auto; position: relative; overflow: hidden; }

      .auth {
        height: 100dvh;
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .authCard {
        width: min(430px, 94vw);
        max-height: calc(100dvh - 32px);
        overflow: auto;
        border: 2px solid var(--blue);
        border-radius: 32px;
        padding: 28px 22px;
        background:
          linear-gradient(135deg, rgba(0, 130, 255, 0.13), transparent 38%),
          linear-gradient(180deg, rgba(8, 28, 55, 0.96), rgba(2, 8, 18, 0.98));
        box-shadow: var(--shadow), inset 0 0 42px rgba(0, 117, 255, 0.12);
      }
      .logoOrb {
        width: 92px;
        height: 92px;
        margin: 0 auto 14px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 35% 25%, #ffffff, #25c7ff 32%, #0444bb 66%, #080b18);
        box-shadow: 0 0 34px rgba(40, 200, 255, 0.8);
      }
      .logoMark {
        font-size: 56px;
        line-height: 1;
        font-weight: 950;
        color: #fff;
        text-shadow: 0 4px 14px #001;
      }
      h1 {
        margin: 0;
        text-align: center;
        letter-spacing: 10px;
        font-size: 28px;
      }
      .subtitle {
        margin: 14px 0 22px;
        text-align: center;
        color: #d9e8ff;
        font-size: 12px;
        letter-spacing: 5px;
        font-weight: 800;
      }
      .tabs {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border: 1px solid rgba(132, 180, 255, 0.36);
        border-radius: 999px;
        padding: 6px;
        margin-bottom: 22px;
      }
      .tabs button {
        border: 0;
        border-radius: 999px;
        height: 46px;
        background: transparent;
        color: #aebbd0;
        font-weight: 900;
        letter-spacing: 2px;
      }
      .tabs button.active {
        background: linear-gradient(135deg, #072c78, #0499ff);
        color: #fff;
        box-shadow: 0 0 22px rgba(0, 153, 255, 0.5);
      }
      .field {
        border: 1px solid rgba(146, 184, 242, 0.5);
        border-radius: 18px;
        margin: 14px 0;
        padding: 8px 14px 14px;
      }
      .field label {
        color: #0b96ff;
        font-size: 14px;
        padding: 0 10px;
      }
      .fieldRow {
        display: grid;
        grid-template-columns: 32px 1fr 36px;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
      }
      .field input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 18px;
      }
      .field input::placeholder { color: #8094b2; }
      .iconBtn {
        border: 1px solid rgba(66, 232, 255, 0.4);
        background: rgba(7, 20, 38, 0.78);
        color: var(--text);
        border-radius: 16px;
        min-height: 44px;
        display: grid;
        place-items: center;
      }
      .primary {
        width: 100%;
        border: 1px solid #0798ff;
        border-radius: 18px;
        min-height: 58px;
        background: linear-gradient(135deg, #263cff, #04a9ff);
        color: #fff;
        box-shadow: 0 0 30px rgba(0, 153, 255, 0.5);
        font-weight: 950;
        letter-spacing: 4px;
        margin-top: 18px;
      }
      .ghost {
        width: 100%;
        min-height: 50px;
        border-radius: 16px;
        border: 1px solid rgba(125, 170, 235, 0.42);
        background: rgba(7, 21, 40, 0.72);
        color: var(--text);
      }
      .photoPick {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-radius: 18px;
        background: rgba(10, 29, 54, 0.86);
        border: 1px solid rgba(82, 153, 255, 0.35);
      }
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #13365e, #061324);
        border: 2px solid var(--blue);
        object-fit: cover;
        display: grid;
        place-items: center;
        color: #8edbff;
        font-weight: 900;
        flex: 0 0 auto;
      }
      .small { color: var(--muted); font-size: 13px; }
      .error { min-height: 20px; color: #ff87a0; text-align: center; margin-top: 12px; }

      .main {
        height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background:
          linear-gradient(90deg, rgba(0, 154, 255, 0.08), transparent 18%, transparent 82%, rgba(124, 60, 255, 0.08)),
          var(--bg);
      }
      .topbar {
        padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(50, 120, 210, 0.26);
      }
      .brand { font-size: 22px; letter-spacing: 2px; font-weight: 950; }
      .content { overflow: auto; padding: 16px 16px 96px; }
      .profileCard, .panel {
        border: 1px solid rgba(66, 157, 255, 0.38);
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(8, 29, 56, 0.9), rgba(3, 11, 24, 0.95));
        box-shadow: inset 0 0 25px rgba(0, 132, 255, 0.06);
        padding: 16px;
        margin-bottom: 14px;
      }
      .profileGrid {
        display: grid;
        grid-template-columns: 64px 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .bigAvatar { width: 64px; height: 64px; }
      .idLine { color: var(--muted); font-size: 13px; word-break: break-all; }
      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 16px 0;
      }
      .action {
        min-height: 86px;
        border: 1px solid rgba(64, 174, 255, 0.32);
        border-radius: 14px;
        background: rgba(8, 31, 58, 0.8);
        color: var(--text);
        display: grid;
        place-items: center;
        text-align: center;
        gap: 4px;
        font-size: 12px;
      }
      .action svg { width: 28px; height: 28px; stroke: var(--cyan); fill: none; stroke-width: 2; }
      .inputLine {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .input, .messageInput {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(110, 165, 235, 0.38);
        border-radius: 16px;
        background: rgba(3, 12, 26, 0.82);
        color: var(--text);
        outline: 0;
        padding: 0 14px;
      }
      .room {
        display: grid;
        grid-template-columns: 50px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(72, 143, 230, 0.28);
        background: rgba(8, 29, 56, 0.82);
        margin: 10px 0;
      }
      .room:active { transform: scale(0.99); }
      .statusDot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--red);
        display: inline-block;
        margin-right: 6px;
      }
      .statusDot.online { background: var(--green); box-shadow: 0 0 12px var(--green); }
      .nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(940px, 100vw);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        padding: 8px 8px calc(env(safe-area-inset-bottom) + 8px);
        border-top: 1px solid rgba(69, 148, 230, 0.36);
        background: rgba(4, 14, 28, 0.96);
      }
      .nav button {
        border: 0;
        background: transparent;
        color: #9bb2ce;
        min-height: 56px;
        display: grid;
        place-items: center;
        gap: 2px;
        font-size: 12px;
      }
      .nav button.active { color: var(--blue); }
      .nav svg { width: 23px; height: 23px; stroke: currentColor; fill: none; stroke-width: 2; }

      .chat {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background:
          radial-gradient(circle at 50% 10%, rgba(0, 135, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #020712, #00040a);
      }
      .chatHeader {
        margin: calc(env(safe-area-inset-top) + 10px) 12px 8px;
        border: 1px solid rgba(0, 150, 255, 0.58);
        border-radius: 22px;
        padding: 10px;
        display: grid;
        grid-template-columns: 44px 56px 1fr repeat(3, 44px);
        gap: 8px;
        align-items: center;
        background: rgba(5, 15, 30, 0.92);
        box-shadow: var(--shadow);
      }
      .chatList {
        overflow: auto;
        padding: 14px 14px 24px;
      }
      .dayPill {
        width: max-content;
        margin: 10px auto 18px;
        padding: 7px 22px;
        border: 1px solid rgba(67, 199, 255, 0.54);
        border-radius: 999px;
        color: #d9f4ff;
      }
      .bubbleRow { display: flex; gap: 8px; margin: 12px 0; align-items: end; }
      .bubbleRow.mine { justify-content: flex-end; }
      .bubble {
        max-width: min(78%, 620px);
        min-width: 92px;
        border-radius: 18px;
        padding: 12px 14px 24px;
        position: relative;
        word-break: break-word;
        border: 1px solid rgba(84, 172, 255, 0.55);
        background: linear-gradient(135deg, rgba(16, 87, 188, 0.94), rgba(5, 63, 150, 0.94));
        box-shadow: 0 0 22px rgba(0, 128, 255, 0.25);
      }
      .bubble.them {
        border-color: rgba(168, 82, 255, 0.55);
        background: linear-gradient(135deg, rgba(42, 22, 74, 0.94), rgba(21, 15, 45, 0.94));
      }
      .time {
        position: absolute;
        right: 12px;
        bottom: 6px;
        font-size: 11px;
        color: #bfdefd;
      }
      .bubble.them .time { left: 14px; right: auto; color: #d7bbff; }
      .composer {
        display: grid;
        grid-template-columns: 48px 1fr 48px 56px;
        gap: 8px;
        padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
        border-top: 1px solid rgba(68, 148, 230, 0.36);
        background: rgba(2, 9, 20, 0.96);
      }
      .send {
        border: 1px solid #0b8cff;
        border-radius: 18px;
        background: linear-gradient(135deg, #273eff, #009cff);
        color: #fff;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 92px;
        transform: translateX(-50%);
        z-index: 60;
        background: rgba(9, 26, 48, 0.98);
        border: 1px solid rgba(88, 165, 255, 0.52);
        border-radius: 18px;
        padding: 12px 16px;
        color: var(--text);
        max-width: min(88vw, 420px);
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 4, 12, 0.72);
      }
      .modalCard {
        width: min(430px, 94vw);
        border: 1px solid rgba(75, 159, 255, 0.55);
        border-radius: 22px;
        background: #061326;
        padding: 18px;
      }
      @media (max-width: 560px) {
        .actions { grid-template-columns: repeat(2, 1fr); }
        .chatHeader { grid-template-columns: 42px 52px 1fr 40px 40px 40px; gap: 6px; }
        .brand { font-size: 19px; }
      }
    </style>
  </head>
  <body>
    <div id="auth" class="auth">
      <div class="authCard">
        <div class="logoOrb"><div class="logoMark">A</div></div>
        <h1>ARCAIDRON</h1>
        <div class="subtitle">CHAT PRIVADO CRIPTOGRAFADO • VOZ • VIDEO</div>
        <div class="tabs">
          <button id="loginTab" class="active" type="button">ENTRAR</button>
          <button id="registerTab" type="button">CRIAR CONTA</button>
        </div>
        <div class="field">
          <label>Seu nome privado</label>
          <div class="fieldRow">
            <span>👤</span>
            <input id="username" autocomplete="username" placeholder="Digite seu nome" />
            <span></span>
          </div>
        </div>
        <div class="field">
          <label>Sua senha</label>
          <div class="fieldRow">
            <span>🔒</span>
            <input id="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />
            <button id="togglePass" class="iconBtn" type="button">👁</button>
          </div>
        </div>
        <div class="photoPick">
          <img id="authAvatarPreview" class="avatar hidden" alt="" />
          <div id="authAvatarFallback" class="avatar">A</div>
          <div style="flex:1">
            <button id="pickPhoto" class="ghost" type="button">Escolher foto de perfil</button>
            <div class="small">A foto aparece para seus contatos.</div>
          </div>
        </div>
        <input id="photoInput" type="file" accept="image/*" hidden />
        <button id="fingerBtn" class="ghost" type="button" style="margin-top:14px">Entrar com impressao digital</button>
        <button id="authBtn" class="primary" type="button">⚡ ENTRAR</button>
        <div class="error" id="authError"></div>
        <p class="small" style="text-align:center">Seus dados ficam protegidos por criptografia de ponta a ponta.</p>
      </div>
    </div>

    <main id="main" class="main hidden">
      <header class="topbar">
        <div class="logoOrb" style="width:42px;height:42px;margin:0"><div class="logoMark" style="font-size:26px">A</div></div>
        <div class="brand">ARCAIDRON</div>
        <button id="menuBtn" class="iconBtn" type="button">⋮</button>
      </header>
      <section id="homeView" class="content"></section>
      <nav class="nav">
        <button data-nav="home" class="active" type="button"><span>⌂</span><span>Inicio</span></button>
        <button data-nav="chats" type="button"><span>▢</span><span>Conversas</span></button>
        <button data-nav="calls" type="button"><span>☎</span><span>Chamadas</span></button>
        <button data-nav="files" type="button"><span>▱</span><span>Arquivos</span></button>
        <button data-nav="profile" type="button"><span>♙</span><span>Perfil</span></button>
      </nav>
    </main>

    <section id="chat" class="chat hidden">
      <header class="chatHeader">
        <button id="backBtn" class="iconBtn" type="button">←</button>
        <img id="peerAvatar" class="avatar" alt="" />
        <div>
          <strong id="peerName"></strong>
          <div class="small"><span id="peerDot" class="statusDot"></span><span id="peerStatus">offline</span></div>
        </div>
        <button id="audioCallBtn" class="iconBtn" type="button">☎</button>
        <button id="videoCallBtn" class="iconBtn" type="button">▣</button>
        <button id="chatMenuBtn" class="iconBtn" type="button">⋮</button>
      </header>
      <div id="messageList" class="chatList"></div>
      <footer class="composer">
        <button id="attachBtn" class="iconBtn" type="button">＋</button>
        <input id="messageInput" class="messageInput" placeholder="Mensagem..." />
        <button id="recordBtn" class="iconBtn" type="button">🎙</button>
        <button id="sendBtn" class="send" type="button">➤</button>
        <input id="fileInput" type="file" hidden />
      </footer>
    </section>

    <div id="modal" class="modal hidden"><div id="modalCard" class="modalCard"></div></div>
    <div id="toast" class="toast hidden"></div>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((items) => items.forEach((item) => item.unregister()))
          .catch(() => {});
      }
      if (window.caches) {
        caches.keys()
          .then((keys) => keys.forEach((key) => caches.delete(key)))
          .catch(() => {});
      }

      const $ = (id) => document.getElementById(id);
      const enc = new TextEncoder();
      const dec = new TextDecoder();
      const state = {
        mode: "login",
        token: localStorage.getItem("arca_token") || "",
        user: null,
        avatar: localStorage.getItem("arca_avatar") || "",
        socket: null,
        rooms: [],
        currentRoom: null,
        roomKeys: new Map(),
        pending: [],
        localStream: null,
        peerConnection: null,
      };

      function toast(text) {
        $("toast").textContent = text;
        $("toast").classList.remove("hidden");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => $("toast").classList.add("hidden"), 2600);
      }

      function cleanUsername(value) {
        return String(value || "").trim().toLowerCase().replace(/[^a-z0-9_.-]/g, "").slice(0, 32);
      }

      function api(path, body = {}) {
        return fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + state.token },
          body: JSON.stringify(body),
        }).then((res) => res.json());
      }

      function safe(text) {
        return String(text || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[c]);
      }

      function time(ts) {
        return new Date(ts || Date.now()).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      }

      function avatarSrc(user) {
        return user?.avatar || "";
      }

      function setAvatar(img, user, fallback = "A") {
        const src = avatarSrc(user);
        if (src) {
          img.src = src;
          img.classList.remove("hidden");
          img.textContent = "";
        } else {
          img.removeAttribute("src");
          img.textContent = fallback;
        }
      }

      function bufToB64(buffer) {
        const bytes = new Uint8Array(buffer);
        let out = "";
        for (const byte of bytes) out += String.fromCharCode(byte);
        return btoa(out);
      }

      function b64ToBuf(text) {
        const bin = atob(text);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out.buffer;
      }

      async function getIdentityKeys(owner = "") {
        if (!window.crypto || !crypto.subtle || !crypto.getRandomValues) {
          throw new Error("Criptografia do navegador indisponivel neste aparelho.");
        }
        const scope = cleanUsername(owner || state.user?.username || $("username")?.value || "default");
        const storageKey = "arca_identity_keys_" + scope;
        const saved = localStorage.getItem(storageKey);
        if (saved) {
          const data = JSON.parse(saved);
          return {
            privateKey: await crypto.subtle.importKey("jwk", data.privateKey, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]),
            publicKey: await crypto.subtle.importKey("jwk", data.publicKey, { name: "ECDH", namedCurve: "P-256" }, true, []),
            publicJwk: data.publicKey,
          };
        }
        const pair = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
        const privateKey = await crypto.subtle.exportKey("jwk", pair.privateKey);
        const publicKey = await crypto.subtle.exportKey("jwk", pair.publicKey);
        localStorage.setItem(storageKey, JSON.stringify({ privateKey, publicKey }));
        return { privateKey: pair.privateKey, publicKey: pair.publicKey, publicJwk: publicKey };
      }

      async function deriveRoomKey(room) {
        if (state.roomKeys.has(room.roomId)) return state.roomKeys.get(room.roomId);
        if (!room.peer?.publicKey) {
          throw new Error("Contato sem chave publica. Peça para ele entrar novamente.");
        }
        const identity = await getIdentityKeys(state.user.username);
        const peerPublic = await crypto.subtle.importKey("jwk", room.peer.publicKey, { name: "ECDH", namedCurve: "P-256" }, true, []);
        const key = await crypto.subtle.deriveKey(
          { name: "ECDH", public: peerPublic },
          identity.privateKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"],
        );
        state.roomKeys.set(room.roomId, key);
        return key;
      }

      async function tryGetIdentityKeys(owner = "") {
        try {
          return await getIdentityKeys(owner);
        } catch (err) {
          console.warn("ARCAIDRON E2E indisponivel antes do login:", err?.message || err);
          return null;
        }
      }

      async function encryptForRoom(room, text) {
        const key = await deriveRoomKey(room);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
        return { cipher: bufToB64(cipher), iv: bufToB64(iv) };
      }

      async function decryptFromRoom(room, message) {
        if (message.deleted) return "Mensagem apagada";
        try {
          const key = await deriveRoomKey(room);
          const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBuf(message.iv) }, key, b64ToBuf(message.cipher));
          return dec.decode(plain);
        } catch {
          return "🔒 Mensagem protegida por outra chave";
        }
      }

      async function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      $("pickPhoto").onclick = () => $("photoInput").click();
      $("photoInput").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) return toast("Escolha uma imagem.");
        const dataUrl = await fileToDataUrl(file);
        state.avatar = dataUrl;
        localStorage.setItem("arca_avatar", dataUrl);
        $("authAvatarPreview").src = dataUrl;
        $("authAvatarPreview").classList.remove("hidden");
        $("authAvatarFallback").classList.add("hidden");
        if (state.token) await api("/api/update-profile", { avatar: dataUrl });
      };

      $("loginTab").onclick = () => setMode("login");
      $("registerTab").onclick = () => setMode("register");
      $("togglePass").onclick = () => {
        $("password").type = $("password").type === "password" ? "text" : "password";
      };
      $("fingerBtn").onclick = async () => {
        if (!window.PublicKeyCredential || !state.token) {
          toast("Entre uma vez com senha para ativar acesso rapido neste aparelho.");
          return;
        }
        await boot();
      };

      function setMode(mode) {
        state.mode = mode;
        $("loginTab").classList.toggle("active", mode === "login");
        $("registerTab").classList.toggle("active", mode === "register");
        $("authBtn").textContent = mode === "login" ? "⚡ ENTRAR" : "🛡 CRIAR CONTA";
        $("authError").textContent = "";
      }

      $("authBtn").onclick = async () => {
        const username = cleanUsername($("username").value);
        const password = $("password").value;
        if (!username || !password) {
          $("authError").textContent = "Digite nome e senha.";
          return;
        }
        $("authBtn").disabled = true;
        $("authError").textContent = "";
        const keys = await tryGetIdentityKeys(username);
        let result;
        try {
          result = await api("/api/" + (state.mode === "register" ? "register" : "login"), {
            username,
            password,
            avatar: state.avatar,
            publicKey: keys ? keys.publicJwk : null,
          });
        } catch (err) {
          $("authBtn").disabled = false;
          $("authError").textContent = "Nao foi possivel conectar ao servidor.";
          return;
        }
        $("authBtn").disabled = false;
        if (result.error) {
          $("authError").textContent = result.error;
          return;
        }
        const user = result.user || {
          username: result.username,
          account: result.account || result.username,
          userId: result.userId,
          avatar: result.avatar || "",
          publicKey: result.publicKey || (keys ? keys.publicJwk : null),
        };
        state.token = result.token;
        state.user = user;
        localStorage.setItem("arca_token", state.token);
        localStorage.setItem("arca_username", state.user.username);
        localStorage.setItem("arca_userid", state.user.userId);
        if (state.user.avatar) localStorage.setItem("arca_avatar", state.user.avatar);
        await showMain();
      };

      async function boot() {
        if (!state.token) return;
        const result = await api("/api/me");
        if (result.error) return;
        state.user = result.user;
        if (state.user.avatar) {
          state.avatar = state.user.avatar;
          localStorage.setItem("arca_avatar", state.avatar);
        }
        const keys = await tryGetIdentityKeys(state.user.username);
        if (keys && !state.user.publicKey) {
          const updated = await api("/api/update-profile", { publicKey: keys.publicJwk });
          if (updated.user) state.user = updated.user;
        }
        await showMain();
      }

      async function showMain() {
        $("auth").classList.add("hidden");
        $("main").classList.remove("hidden");
        connectSocket();
        await refreshRooms();
        renderHome("home");
      }

      function logout() {
        localStorage.removeItem("arca_token");
        state.token = "";
        location.reload();
      }

      function connectSocket() {
        if (state.socket) state.socket.disconnect();
        state.socket = io({ auth: { token: state.token }, transports: ["websocket", "polling"], reconnection: true });
        state.socket.on("connect", () => {
          if (state.currentRoom) joinRoom(state.currentRoom);
        });
        state.socket.on("room:history", async ({ roomId, messages }) => {
          if (!state.currentRoom || state.currentRoom.roomId !== roomId) return;
          await renderMessages(messages || []);
        });
        state.socket.on("message:new", async (message) => {
          if (state.currentRoom && message.roomId === state.currentRoom.roomId) {
            await appendMessage(message);
            if (message.from !== state.user.username) {
              state.socket.emit("message:seen", { roomId: message.roomId, id: message.id });
            }
          }
          refreshRooms();
        });
        state.socket.on("message:deleted", ({ id }) => {
          const row = document.querySelector(`[data-message-id="${CSS.escape(id)}"] .bubble`);
          if (row) row.firstChild.textContent = "Mensagem apagada";
        });
        state.socket.on("message:seen", ({ id }) => {
          const marker = document.querySelector(`[data-message-id="${CSS.escape(id)}"] .seen`);
          if (marker) marker.textContent = " ✓✓";
        });
        state.socket.on("presence:update", ({ user }) => {
          updatePresence(user);
        });
        state.socket.on("typing", ({ username, typing }) => {
          if (state.currentRoom && username === state.currentRoom.peer.username) {
            $("peerStatus").textContent = typing ? "digitando..." : statusText(state.currentRoom.peer);
          }
        });
        state.socket.on("call:signal", handleCallSignal);
      }

      async function refreshRooms() {
        const result = await api("/api/rooms");
        if (result.error) return toast(result.error);
        state.rooms = result.rooms || [];
        if (result.user) state.user = result.user;
      }

      function renderHome(section = "home") {
        document.querySelectorAll(".nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.nav === section));
        if (section === "profile") return renderProfile();
        if (section === "files") return renderFiles();
        if (section === "calls") return renderCalls();
        const rooms = state.rooms;
        $("homeView").innerHTML = `
          <div class="profileCard">
            <div class="profileGrid">
              <img id="meAvatar" class="avatar bigAvatar" alt="" />
              <div>
                <strong style="font-size:22px">${safe(state.user.username)}</strong>
                <div class="idLine">ID: <span id="myId">${safe(state.user.userId)}</span></div>
              </div>
              <button class="iconBtn" onclick="copyId()">▣</button>
            </div>
          </div>
          <div class="actions">
            <button class="action" onclick="showAddFriend()">${iconUser()}<span>Novo amigo</span></button>
            <button class="action" onclick="renderHome('chats')">${iconChat()}<span>Bate-papo</span></button>
            <button class="action" onclick="showVault()">${iconLock()}<span>Cofre privado</span></button>
            <button class="action" onclick="showSettings()">${iconGear()}<span>Configurações</span></button>
          </div>
          <div class="panel">
            <h3>${section === "chats" ? "Bate-papo" : "Conversas"}</h3>
            <div id="rooms"></div>
          </div>
        `;
        setAvatar($("meAvatar"), state.user, "A");
        renderRooms(rooms);
      }

      function renderRooms(rooms) {
        const box = $("rooms");
        if (!box) return;
        if (!rooms.length) {
          box.innerHTML = `<div class="small">Nenhum contato ainda. Adicione pelo ID unico.</div>`;
          return;
        }
        box.innerHTML = rooms.map((room, index) => `
          <div class="room" onclick="openRoomByIndex(${index})">
            <img class="avatar" src="${safe(room.peer.avatar || "")}" alt="" onerror="this.removeAttribute('src');this.textContent='${safe((room.peer.username || 'A')[0].toUpperCase())}'" />
            <div>
              <strong>${safe(room.peer.username)}</strong>
              <div class="small"><span class="statusDot ${room.peer.online ? "online" : ""}"></span>${statusText(room.peer)}</div>
            </div>
            <button class="iconBtn" onclick="event.stopPropagation();hideContact(${index})">⌫</button>
          </div>
        `).join("");
      }

      function statusText(user) {
        if (!user) return "offline";
        if (user.online) return "online agora";
        if (user.lastSeen) return "visto por ultimo as " + time(user.lastSeen);
        return "offline";
      }

      function updatePresence(user) {
        if (!user) return;
        for (const room of state.rooms) {
          if (room.peer.userId === user.userId) {
            room.peer = { ...room.peer, ...user };
          }
        }
        if (state.currentRoom && state.currentRoom.peer.userId === user.userId) {
          state.currentRoom.peer = { ...state.currentRoom.peer, ...user };
          $("peerDot").classList.toggle("online", !!user.online);
          $("peerStatus").textContent = statusText(user);
        }
      }

      window.copyId = async () => {
        await navigator.clipboard.writeText(state.user.userId);
        toast("ID copiado.");
      };

      window.showAddFriend = () => {
        showModal(`
          <h3>Adicionar amigo por ID</h3>
          <p class="small">A sala sera criada pela uniao do seu ID com o ID do contato.</p>
          <div class="inputLine">
            <input id="friendId" class="input" placeholder="arc_..." />
            <button class="iconBtn" onclick="addFriend()">＋</button>
          </div>
        `);
      };

      window.addFriend = async () => {
        const userId = $("friendId").value.trim();
        const result = await api("/api/add-friend", { userId });
        if (result.error) return toast(result.error);
        hideModal();
        await refreshRooms();
        renderHome("chats");
        const index = state.rooms.findIndex((room) => room.roomId === result.room.roomId);
        if (index >= 0) openRoomByIndex(index);
      };

      window.openRoomByIndex = async (index) => {
        const room = state.rooms[index];
        if (!room) return toast("Sala nao encontrada.");
        state.currentRoom = room;
        $("chat").classList.remove("hidden");
        $("peerName").textContent = room.peer.username;
        setAvatar($("peerAvatar"), room.peer, (room.peer.username || "A")[0].toUpperCase());
        $("peerDot").classList.toggle("online", !!room.peer.online);
        $("peerStatus").textContent = statusText(room.peer);
        $("messageList").innerHTML = `<div class="dayPill">Hoje</div>`;
        try {
          await deriveRoomKey(room);
        } catch (err) {
          toast(err.message || "Chave do contato indisponivel.");
          return;
        }
        joinRoom(room);
        const history = await api("/api/history", { roomId: room.roomId });
        if (history.messages) await renderMessages(history.messages);
      };

      function joinRoom(room) {
        if (!state.socket || !state.socket.connected) return;
        state.socket.emit("room:join", { roomId: room.roomId });
      }

      async function renderMessages(messages) {
        $("messageList").innerHTML = `<div class="dayPill">Hoje</div>`;
        for (const message of messages) await appendMessage(message);
        $("messageList").scrollTop = $("messageList").scrollHeight;
      }

      async function appendMessage(message) {
        if (!state.currentRoom || message.roomId !== state.currentRoom.roomId) return;
        if (document.querySelector(`[data-message-id="${CSS.escape(message.id)}"]`)) return;
        const mine = message.from === state.user.username;
        const text = await decryptFromRoom(state.currentRoom, message);
        const row = document.createElement("div");
        row.className = "bubbleRow " + (mine ? "mine" : "them");
        row.dataset.messageId = message.id;
        const avatar = !mine ? `<img class="avatar" style="width:34px;height:34px" src="${safe(state.currentRoom.peer.avatar || "")}" alt="">` : "";
        row.innerHTML = `
          ${avatar}
          <div class="bubble ${mine ? "" : "them"}" ondblclick="deleteMessage('${safe(message.id)}')">
            <span>${safe(text)}</span>
            <span class="time">${time(message.createdAt)}<span class="seen">${mine ? " ✓" : ""}</span></span>
          </div>
        `;
        $("messageList").appendChild(row);
        $("messageList").scrollTop = $("messageList").scrollHeight;
      }

      $("sendBtn").onclick = sendText;
      $("messageInput").onkeydown = (event) => {
        if (event.key === "Enter") sendText();
      };
      $("messageInput").oninput = () => {
        if (state.currentRoom && state.socket) {
          state.socket.emit("typing", { roomId: state.currentRoom.roomId, typing: true });
          clearTimeout($("messageInput").typingTimer);
          $("messageInput").typingTimer = setTimeout(() => {
            state.socket.emit("typing", { roomId: state.currentRoom.roomId, typing: false });
          }, 700);
        }
      };

      async function sendText() {
        const text = $("messageInput").value.trim();
        if (!state.currentRoom) return toast("Abra uma conversa.");
        if (!text) return;
        const encrypted = await encryptForRoom(state.currentRoom, text);
        const message = {
          id: crypto.randomUUID(),
          roomId: state.currentRoom.roomId,
          from: state.user.username,
          type: "text",
          ...encrypted,
          createdAt: Date.now(),
        };
        $("messageInput").value = "";
        await appendMessage(message);
        state.socket.emit("message:send", message, (ack) => {
          if (!ack || ack.error) toast(ack?.error || "Falha ao enviar.");
        });
      }

      window.deleteMessage = (id) => {
        if (!state.currentRoom) return;
        if (!confirm("Apagar esta mensagem para todos?")) return;
        state.socket.emit("message:delete", { roomId: state.currentRoom.roomId, id });
      };

      $("backBtn").onclick = () => {
        $("chat").classList.add("hidden");
        state.currentRoom = null;
        refreshRooms().then(() => renderHome("chats"));
      };

      $("attachBtn").onclick = () => $("fileInput").click();
      $("fileInput").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const dataUrl = await fileToDataUrl(file);
        $("messageInput").value = `[arquivo:${file.name}] ${dataUrl}`;
        await sendText();
        event.target.value = "";
      };

      $("recordBtn").onclick = async () => {
        if (!navigator.mediaDevices?.getUserMedia) return toast("Microfone indisponivel.");
        toast("Gravacao simples: use + para enviar audio/arquivo nesta versao.");
      };

      $("audioCallBtn").onclick = () => startCall(false);
      $("videoCallBtn").onclick = () => startCall(true);

      async function startCall(video) {
        if (!state.currentRoom) return;
        if (!navigator.mediaDevices?.getUserMedia) return toast("Camera/microfone indisponivel.");
        state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video });
        state.peerConnection = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        state.localStream.getTracks().forEach((track) => state.peerConnection.addTrack(track, state.localStream));
        state.peerConnection.onicecandidate = (event) => {
          if (event.candidate) state.socket.emit("call:signal", { roomId: state.currentRoom.roomId, type: "ice", candidate: event.candidate });
        };
        const offer = await state.peerConnection.createOffer();
        await state.peerConnection.setLocalDescription(offer);
        state.socket.emit("call:signal", { roomId: state.currentRoom.roomId, type: "offer", offer, video });
        toast(video ? "Chamando video..." : "Chamando voz...");
      }

      async function handleCallSignal(data) {
        if (!state.currentRoom || data.roomId !== state.currentRoom.roomId) return;
        if (data.type === "offer") {
          if (!confirm(`${data.from} esta chamando. Atender?`)) return;
          state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: !!data.video });
          state.peerConnection = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
          state.localStream.getTracks().forEach((track) => state.peerConnection.addTrack(track, state.localStream));
          state.peerConnection.onicecandidate = (event) => {
            if (event.candidate) state.socket.emit("call:signal", { roomId: data.roomId, type: "ice", candidate: event.candidate });
          };
          await state.peerConnection.setRemoteDescription(data.offer);
          const answer = await state.peerConnection.createAnswer();
          await state.peerConnection.setLocalDescription(answer);
          state.socket.emit("call:signal", { roomId: data.roomId, type: "answer", answer });
          toast("Chamada conectando...");
        }
        if (data.type === "answer" && state.peerConnection) {
          await state.peerConnection.setRemoteDescription(data.answer);
        }
        if (data.type === "ice" && state.peerConnection && data.candidate) {
          await state.peerConnection.addIceCandidate(data.candidate).catch(() => {});
        }
      }

      window.hideContact = async (index) => {
        const room = state.rooms[index];
        if (!room || !confirm("Apagar contato desta lista? A sala segura pode ser restaurada pelo ID.")) return;
        const result = await api("/api/hide-contact", { userId: room.peer.userId });
        if (result.error) return toast(result.error);
        await refreshRooms();
        renderHome("chats");
      };

      function renderProfile() {
        $("homeView").innerHTML = `
          <div class="profileCard" style="text-align:center">
            <img id="profileAvatar" class="avatar bigAvatar" style="margin:0 auto 12px" alt="" />
            <h2>${safe(state.user.username)}</h2>
            <div class="idLine">${safe(state.user.userId)}</div>
            <canvas id="qrCanvas" width="156" height="156" style="margin:18px auto;display:block;background:#fff;border-radius:16px;padding:8px"></canvas>
            <button class="primary" onclick="document.getElementById('photoInput').click()">EDITAR PERFIL</button>
          </div>
        `;
        setAvatar($("profileAvatar"), state.user, "A");
        drawFakeQr($("qrCanvas"), state.user.userId);
      }

      function drawFakeQr(canvas, text) {
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, 156, 156);
        ctx.fillStyle = "#001326";
        let seed = 0;
        for (const ch of text) seed += ch.charCodeAt(0);
        for (let y = 0; y < 13; y++) {
          for (let x = 0; x < 13; x++) {
            if ((x < 3 && y < 3) || (x > 9 && y < 3) || (x < 3 && y > 9) || ((x * 17 + y * 31 + seed) % 5 < 2)) {
              ctx.fillRect(12 + x * 10, 12 + y * 10, 8, 8);
            }
          }
        }
      }

      function renderFiles() {
        $("homeView").innerHTML = `
          <div class="panel"><h3>Arquivos</h3>
          <div class="actions">
            <button class="action" onclick="document.getElementById('fileInput').click()">Imagem</button>
            <button class="action" onclick="document.getElementById('fileInput').click()">Video</button>
            <button class="action" onclick="document.getElementById('fileInput').click()">Audio</button>
            <button class="action" onclick="document.getElementById('fileInput').click()">Docs</button>
          </div><p class="small">Abra uma conversa para enviar arquivos criptografados.</p></div>`;
      }

      function renderCalls() {
        $("homeView").innerHTML = `<div class="panel"><h3>Chamadas</h3><p class="small">Abra uma conversa e use os botoes de voz ou video no topo.</p></div>`;
      }

      window.showVault = () => {
        showModal(`<h3>Cofre privado</h3><p class="small">Nesta reconstrução, os contatos ficam protegidos pelo login do aparelho. Use apagar contato para ocultar da lista e adicione o ID novamente para restaurar.</p><button class="primary" onclick="hideModal()">OK</button>`);
      };

      window.showSettings = () => {
        showModal(`
          <h3>Configurações</h3>
          <button class="ghost" onclick="document.getElementById('photoInput').click()">Atualizar foto</button>
          <button class="ghost" style="margin-top:10px" onclick="copyId()">Copiar meu ID</button>
          <button class="ghost" style="margin-top:10px" onclick="logout()">Entrar em outra conta</button>
        `);
      };

      $("menuBtn").onclick = showSettings;
      $("chatMenuBtn").onclick = () => {
        showModal(`
          <h3>Conversa</h3>
          <button class="ghost" onclick="clearChatLocal()">Apagar mensagens desta tela</button>
          <button class="ghost" style="margin-top:10px" onclick="hideModal()">Fechar</button>
        `);
      };

      window.clearChatLocal = () => {
        $("messageList").innerHTML = `<div class="dayPill">Hoje</div>`;
        hideModal();
      };

      function showModal(html) {
        $("modalCard").innerHTML = html;
        $("modal").classList.remove("hidden");
      }
      window.hideModal = () => $("modal").classList.add("hidden");
      $("modal").onclick = (event) => {
        if (event.target === $("modal")) hideModal();
      };

      document.querySelectorAll(".nav button").forEach((btn) => {
        btn.onclick = async () => {
          await refreshRooms();
          renderHome(btn.dataset.nav);
        };
      });

      function iconUser() { return `<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg>`; }
      function iconChat() { return `<svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>`; }
      function iconLock() { return `<svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`; }
      function iconGear() { return `<svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-1.9.3 1.7 1.7 0 0 0-.8 1.6V22H9v-.2a1.7 1.7 0 0 0-.8-1.6 1.7 1.7 0 0 0-1.9-.3l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3 14H2v-4h1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7l2-3.4.2.1a1.7 1.7 0 0 0 1.9-.3A1.7 1.7 0 0 0 9 1.8V2h6v-.2a1.7 1.7 0 0 0 .8 1.6 1.7 1.7 0 0 0 1.9.3l.2-.1 2 3.4-.1.1a1.7 1.7 0 0 0-.3 1.9A1.7 1.7 0 0 0 21 10h1v4h-1a1.7 1.7 0 0 0-1.6 1z"/></svg>`; }

      boot();
    </script>
  </body>
</html>
