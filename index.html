<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ARCAIDRON</title>
    <meta name="theme-color" content="#030814" />
    <link rel="manifest" href="/public/manifest.json" />
    <script src="/socket.io/socket.io.js"></script>
    <style>
      :root {
        --bg: #020712;
        --panel: rgba(6, 19, 37, 0.92);
        --panel2: rgba(10, 32, 62, 0.78);
        --line: rgba(55, 143, 255, 0.46);
        --text: #f4f9ff;
        --muted: #91a9c6;
        --blue: #0b8cff;
        --cyan: #42e8ff;
        --violet: #7c3cff;
        --red: #ff3d63;
        --green: #20e070;
        --shadow: 0 0 30px rgba(0, 132, 255, 0.34);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, Arial, system-ui, sans-serif;
        background:
          radial-gradient(circle at 50% -10%, rgba(0, 132, 255, 0.28), transparent 36%),
          radial-gradient(circle at 85% 24%, rgba(123, 60, 255, 0.2), transparent 26%),
          linear-gradient(180deg, #020814, #00040b);
        color: var(--text);
        overflow: hidden;
      }
      body[data-theme="red"] { --blue: #ff2858; --cyan: #ff8ba5; --violet: #9d1232; }
      body[data-theme="orange"] { --blue: #ff8a00; --cyan: #ffd166; --violet: #ff4f1f; }
      body[data-theme="white"] { --bg: #edf6ff; --panel: rgba(235, 247, 255, 0.94); --panel2: rgba(255, 255, 255, 0.9); --text: #061326; --muted: #385675; --blue: #0878ff; --cyan: #0bbde8; --violet: #2455ff; }
      button, input { font: inherit; }
      button { cursor: pointer; }
      .hidden { display: none !important; }
      .appShell { width: min(940px, 100vw); height: 100dvh; margin: 0 auto; position: relative; overflow: hidden; }

      .auth {
        height: 100dvh;
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .authCard {
        width: min(430px, 94vw);
        max-height: calc(100dvh - 32px);
        overflow: auto;
        border: 2px solid var(--blue);
        border-radius: 32px;
        padding: 28px 22px;
        background:
          linear-gradient(135deg, rgba(0, 130, 255, 0.13), transparent 38%),
          linear-gradient(180deg, rgba(8, 28, 55, 0.96), rgba(2, 8, 18, 0.98));
        box-shadow: var(--shadow), inset 0 0 42px rgba(0, 117, 255, 0.12);
      }
      .logoOrb {
        width: 92px;
        height: 92px;
        margin: 0 auto 14px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 35% 25%, #ffffff, #25c7ff 32%, #0444bb 66%, #080b18);
        box-shadow: 0 0 34px rgba(40, 200, 255, 0.8);
      }
      .logoMark {
        font-size: 56px;
        line-height: 1;
        font-weight: 950;
        color: #fff;
        text-shadow: 0 4px 14px #001;
      }
      .arcaLogo {
        width: 72%;
        height: 72%;
        filter: drop-shadow(0 0 12px rgba(66, 232, 255, 0.9));
      }
      .arcaLogo .shield {
        fill: url(#arcaShield);
        stroke: #7af2ff;
        stroke-width: 2.2;
      }
      .arcaLogo .core {
        fill: rgba(1, 12, 28, 0.92);
        stroke: #ffffff;
        stroke-width: 1.6;
      }
      .arcaLogo .line {
        stroke: #39dfff;
        stroke-width: 1.7;
        stroke-linecap: round;
      }
      h1 {
        margin: 0;
        text-align: center;
        letter-spacing: 10px;
        font-size: 28px;
      }
      .subtitle {
        margin: 14px 0 22px;
        text-align: center;
        color: #d9e8ff;
        font-size: 12px;
        letter-spacing: 5px;
        font-weight: 800;
      }
      .tabs {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border: 1px solid rgba(132, 180, 255, 0.36);
        border-radius: 999px;
        padding: 6px;
        margin-bottom: 22px;
      }
      .tabs button {
        border: 0;
        border-radius: 999px;
        height: 46px;
        background: transparent;
        color: #aebbd0;
        font-weight: 900;
        letter-spacing: 2px;
      }
      .tabs button.active {
        background: linear-gradient(135deg, #072c78, #0499ff);
        color: #fff;
        box-shadow: 0 0 22px rgba(0, 153, 255, 0.5);
      }
      .field {
        border: 1px solid rgba(146, 184, 242, 0.5);
        border-radius: 18px;
        margin: 14px 0;
        padding: 8px 14px 14px;
      }
      .field label {
        color: #0b96ff;
        font-size: 14px;
        padding: 0 10px;
      }
      .fieldRow {
        display: grid;
        grid-template-columns: 32px 1fr 36px;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
      }
      .field input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 18px;
      }
      .field input::placeholder { color: #8094b2; }
      .iconBtn {
        border: 1px solid rgba(66, 232, 255, 0.4);
        background: rgba(7, 20, 38, 0.78);
        color: var(--text);
        border-radius: 16px;
        min-height: 44px;
        display: grid;
        place-items: center;
      }
      .primary {
        width: 100%;
        border: 1px solid #0798ff;
        border-radius: 18px;
        min-height: 58px;
        background: linear-gradient(135deg, #263cff, #04a9ff);
        color: #fff;
        box-shadow: 0 0 30px rgba(0, 153, 255, 0.5);
        font-weight: 950;
        letter-spacing: 4px;
        margin-top: 18px;
      }
      .ghost {
        width: 100%;
        min-height: 50px;
        border-radius: 16px;
        border: 1px solid rgba(125, 170, 235, 0.42);
        background: rgba(7, 21, 40, 0.72);
        color: var(--text);
      }
      .photoPick {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-radius: 18px;
        background: rgba(10, 29, 54, 0.86);
        border: 1px solid rgba(82, 153, 255, 0.35);
      }
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #13365e, #061324);
        border: 2px solid var(--blue);
        object-fit: cover;
        display: grid;
        place-items: center;
        color: #8edbff;
        font-weight: 900;
        flex: 0 0 auto;
      }
      .small { color: var(--muted); font-size: 13px; }
      .error { min-height: 20px; color: #ff87a0; text-align: center; margin-top: 12px; }

      .main {
        height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background:
          linear-gradient(90deg, rgba(0, 154, 255, 0.08), transparent 18%, transparent 82%, rgba(124, 60, 255, 0.08)),
          var(--bg);
      }
      .topbar {
        padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(50, 120, 210, 0.26);
      }
      .brand { font-size: 22px; letter-spacing: 2px; font-weight: 950; }
      .content { overflow: auto; padding: 16px 16px 96px; }
      .profileCard, .panel {
        border: 1px solid rgba(66, 157, 255, 0.38);
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(8, 29, 56, 0.9), rgba(3, 11, 24, 0.95));
        box-shadow: inset 0 0 25px rgba(0, 132, 255, 0.06);
        padding: 16px;
        margin-bottom: 14px;
      }
      .profileGrid {
        display: grid;
        grid-template-columns: 64px 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .bigAvatar { width: 64px; height: 64px; }
      .idLine { color: var(--muted); font-size: 13px; word-break: break-all; }
      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 16px 0;
      }
      .action {
        min-height: 86px;
        border: 1px solid rgba(64, 174, 255, 0.32);
        border-radius: 14px;
        background: rgba(8, 31, 58, 0.8);
        color: var(--text);
        display: grid;
        place-items: center;
        text-align: center;
        gap: 4px;
        font-size: 12px;
      }
      .action svg { width: 28px; height: 28px; stroke: var(--cyan); fill: none; stroke-width: 2; }
      .inputLine {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .input, .messageInput {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(110, 165, 235, 0.38);
        border-radius: 16px;
        background: rgba(3, 12, 26, 0.82);
        color: var(--text);
        outline: 0;
        padding: 0 14px;
      }
      .room {
        display: grid;
        grid-template-columns: 50px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(72, 143, 230, 0.28);
        background: rgba(8, 29, 56, 0.82);
        margin: 10px 0;
      }
      .room:active { transform: scale(0.99); }
      .statusDot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--red);
        display: inline-block;
        margin-right: 6px;
      }
      .statusDot.online { background: var(--green); box-shadow: 0 0 12px var(--green); }
      .nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(940px, 100vw);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        padding: 8px 8px calc(env(safe-area-inset-bottom) + 8px);
        border-top: 1px solid rgba(69, 148, 230, 0.36);
        background: rgba(4, 14, 28, 0.96);
      }
      .nav button {
        border: 0;
        background: transparent;
        color: #9bb2ce;
        min-height: 56px;
        display: grid;
        place-items: center;
        gap: 2px;
        font-size: 12px;
      }
      .nav button.active { color: var(--blue); }
      .nav svg { width: 23px; height: 23px; stroke: currentColor; fill: none; stroke-width: 2; }

      .chat {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background:
          radial-gradient(circle at 50% 10%, rgba(0, 135, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #020712, #00040a);
      }
      .chatHeader {
        margin: calc(env(safe-area-inset-top) + 10px) 12px 8px;
        border: 1px solid rgba(0, 150, 255, 0.58);
        border-radius: 22px;
        padding: 10px;
        display: grid;
        grid-template-columns: 44px 56px 1fr repeat(3, 44px);
        gap: 8px;
        align-items: center;
        background: rgba(5, 15, 30, 0.92);
        box-shadow: var(--shadow);
      }
      .chatList {
        overflow: auto;
        padding: 14px 14px 24px;
      }
      .dayPill {
        width: max-content;
        margin: 10px auto 18px;
        padding: 7px 22px;
        border: 1px solid rgba(67, 199, 255, 0.54);
        border-radius: 999px;
        color: #d9f4ff;
      }
      .bubbleRow { display: flex; gap: 8px; margin: 12px 0; align-items: end; }
      .bubbleRow.mine { justify-content: flex-end; }
      .bubble {
        max-width: min(78%, 620px);
        min-width: 92px;
        border-radius: 18px;
        padding: 12px 14px 24px;
        position: relative;
        word-break: normal;
        overflow-wrap: break-word;
        border: 1px solid rgba(84, 172, 255, 0.55);
        background: linear-gradient(135deg, rgba(16, 87, 188, 0.94), rgba(5, 63, 150, 0.94));
        box-shadow: 0 0 22px rgba(0, 128, 255, 0.25);
      }
      .bubbleText {
        display: block;
        white-space: pre-wrap;
      }
      .audioMessage {
        width: min(260px, 58vw);
        display: block;
        filter: drop-shadow(0 0 10px rgba(66, 232, 255, 0.25));
      }
      .filePreview {
        display: grid;
        gap: 8px;
        min-width: min(240px, 58vw);
      }
      .fileImage,
      .fileVideo {
        width: min(320px, 62vw);
        max-height: 360px;
        display: block;
        border-radius: 14px;
        border: 1px solid rgba(66, 232, 255, 0.35);
        background: rgba(0, 0, 0, 0.24);
        object-fit: contain;
      }
      .fileDocument {
        display: grid;
        grid-template-columns: 38px 1fr;
        gap: 10px;
        align-items: center;
        min-width: min(260px, 60vw);
        padding: 12px;
        border: 1px solid rgba(66, 232, 255, 0.35);
        border-radius: 14px;
        color: var(--text);
        text-decoration: none;
        background: rgba(0, 0, 0, 0.2);
      }
      .fileIcon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        color: #fff;
        font-weight: 900;
      }
      .fileCaption {
        color: #dcecff;
        font-size: 13px;
        word-break: break-word;
      }
      .fileHint {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .replyQuote {
        display: block;
        margin: 0 0 8px;
        padding: 8px 10px;
        border-left: 3px solid var(--cyan);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.2);
        color: #cfe6ff;
        font-size: 12px;
      }
      .replyBar {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 38px;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid rgba(66, 232, 255, 0.36);
        border-radius: 14px;
        background: rgba(6, 22, 42, 0.96);
        color: #cfe6ff;
        font-size: 13px;
      }
      .replyBtn {
        position: absolute;
        top: 6px;
        right: 8px;
        border: 0;
        background: transparent;
        color: #cfe6ff;
        font-size: 17px;
      }
      .bubble.them .replyBtn { right: 8px; }
      .bubble.them {
        border-color: rgba(168, 82, 255, 0.55);
        background: linear-gradient(135deg, rgba(42, 22, 74, 0.94), rgba(21, 15, 45, 0.94));
      }
      .time {
        position: absolute;
        right: 12px;
        bottom: 6px;
        font-size: 11px;
        color: #bfdefd;
      }
      .bubble.them .time { left: 14px; right: auto; color: #d7bbff; }
      .composer {
        display: grid;
        grid-template-columns: 48px 1fr 48px 56px;
        gap: 8px;
        padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
        border-top: 1px solid rgba(68, 148, 230, 0.36);
        background: rgba(2, 9, 20, 0.96);
      }
      .send {
        border: 1px solid #0b8cff;
        border-radius: 18px;
        background: linear-gradient(135deg, #273eff, #009cff);
        color: #fff;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 92px;
        transform: translateX(-50%);
        z-index: 60;
        background: rgba(9, 26, 48, 0.98);
        border: 1px solid rgba(88, 165, 255, 0.52);
        border-radius: 18px;
        padding: 12px 16px;
        color: var(--text);
        max-width: min(88vw, 420px);
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 4, 12, 0.72);
      }
      .modalCard {
        width: min(430px, 94vw);
        border: 1px solid rgba(75, 159, 255, 0.55);
        border-radius: 22px;
        background: #061326;
        padding: 18px;
      }
      .callOverlay {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: grid;
        place-items: center;
        padding: 18px;
        background: radial-gradient(circle at 50% 20%, rgba(0, 145, 255, 0.28), transparent 36%), rgba(0, 4, 12, 0.9);
      }
      .callCard {
        width: min(460px, 94vw);
        max-height: calc(100dvh - 36px);
        border: 1px solid rgba(66, 232, 255, 0.62);
        border-radius: 28px;
        padding: 22px;
        background: linear-gradient(145deg, rgba(8, 29, 56, 0.96), rgba(2, 8, 18, 0.98));
        box-shadow: 0 0 42px rgba(0, 132, 255, 0.42);
        text-align: center;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .callVideos {
        position: relative;
        flex: 1 1 min(52dvh, 420px);
        min-height: 180px;
        max-height: min(52dvh, 420px);
        margin: 14px 0;
        border-radius: 22px;
        overflow: hidden;
        background: #020814;
        border: 1px solid rgba(75, 159, 255, 0.4);
      }
      .callVideos video {
        width: 100%;
        height: 100%;
        min-height: 0;
        object-fit: cover;
        background: #020814;
      }
      #localVideo {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: 112px;
        height: 148px;
        min-height: 0;
        border-radius: 16px;
        border: 1px solid rgba(66, 232, 255, 0.72);
        box-shadow: 0 0 18px rgba(0, 132, 255, 0.5);
      }
      .callActions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 10px;
      }
      .callCard > .callActions {
        flex: 0 0 auto;
        position: relative;
        z-index: 3;
        padding-top: 8px;
        background: linear-gradient(180deg, rgba(2, 8, 18, 0), rgba(2, 8, 18, 0.96) 28%);
      }
      .danger {
        border: 1px solid rgba(255, 61, 99, 0.7);
        background: linear-gradient(135deg, #9d1232, #ff3d63);
      }
      @media (max-width: 560px) {
        .actions { grid-template-columns: repeat(2, 1fr); }
        .chatHeader { grid-template-columns: 42px 52px 1fr 40px 40px 40px; gap: 6px; }
        .brand { font-size: 19px; }
        .callOverlay {
          place-items: stretch;
          padding: calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 10px);
        }
        .callCard {
          width: 100%;
          max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
          padding: 14px;
          border-radius: 24px;
        }
        .callCard .bigAvatar {
          width: 56px;
          height: 56px;
          margin-bottom: 6px !important;
        }
        .callCard h2 {
          margin: 4px 0;
          font-size: 20px;
        }
        .callCard .small {
          margin: 4px 0;
        }
        .callVideos {
          flex-basis: 46dvh;
          min-height: 0;
          max-height: 46dvh;
          margin: 10px 0;
        }
        #localVideo {
          width: 88px;
          height: 116px;
          right: 10px;
          bottom: 10px;
        }
        .callActions {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 8px;
        }
        .callActions button {
          min-height: 48px;
          padding-inline: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="auth" class="auth">
      <div class="authCard">
        <div class="logoOrb"><svg class="arcaLogo" viewBox="0 0 80 80" aria-hidden="true"><defs><linearGradient id="arcaShield" x1="16" y1="8" x2="64" y2="72" gradientUnits="userSpaceOnUse"><stop stop-color="#7af2ff"/><stop offset=".45" stop-color="#078cff"/><stop offset="1" stop-color="#6c36ff"/></linearGradient></defs><path class="shield" d="M40 6 65 16v19c0 17-10 29-25 37C25 64 15 52 15 35V16L40 6z"/><path class="core" d="M27 30c0-8 6-14 14-14s14 6 14 14-6 14-14 14h-5l-9 7 2-10a14 14 0 0 1-2-11z"/><path class="line" d="M26 58h28M22 24l-8-4M58 24l8-4M23 44l-8 5M57 44l8 5"/><circle cx="34" cy="30" r="2.3" fill="#42e8ff"/><circle cx="41" cy="30" r="2.3" fill="#42e8ff"/><circle cx="48" cy="30" r="2.3" fill="#42e8ff"/></svg></div>
        <h1>ARCAIDRON</h1>
        <div class="subtitle">CHAT PRIVADO CRIPTOGRAFADO • VOZ • VIDEO</div>
        <div class="tabs">
          <button id="loginTab" class="active" type="button">ENTRAR</button>
          <button id="registerTab" type="button">CRIAR CONTA</button>
        </div>
        <div class="field">
          <label>Seu nome privado</label>
          <div class="fieldRow">
            <span>👤</span>
            <input id="username" autocomplete="username" placeholder="Digite seu nome" />
            <span></span>
          </div>
        </div>
        <div class="field">
          <label>Sua senha</label>
          <div class="fieldRow">
            <span>🔒</span>
            <input id="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />
            <button id="togglePass" class="iconBtn" type="button">👁</button>
          </div>
        </div>
        <div class="photoPick">
          <img id="authAvatarPreview" class="avatar hidden" alt="" />
          <div id="authAvatarFallback" class="avatar">A</div>
          <div style="flex:1">
            <button id="pickPhoto" class="ghost" type="button">Escolher foto de perfil</button>
            <div class="small">A foto aparece para seus contatos.</div>
          </div>
        </div>
        <input id="photoInput" type="file" accept="image/*" hidden />
        <button id="authBtn" class="primary" type="button">⚡ ENTRAR</button>
        <div class="error" id="authError"></div>
        <p class="small" style="text-align:center">Seus dados ficam protegidos por criptografia de ponta a ponta.</p>
      </div>
    </div>

    <main id="main" class="main hidden">
      <header class="topbar">
        <div class="logoOrb" style="width:42px;height:42px;margin:0"><svg class="arcaLogo" viewBox="0 0 80 80" aria-hidden="true"><defs><linearGradient id="arcaShieldSmall" x1="16" y1="8" x2="64" y2="72" gradientUnits="userSpaceOnUse"><stop stop-color="#7af2ff"/><stop offset=".45" stop-color="#078cff"/><stop offset="1" stop-color="#6c36ff"/></linearGradient></defs><path fill="url(#arcaShieldSmall)" stroke="#7af2ff" stroke-width="2.2" d="M40 6 65 16v19c0 17-10 29-25 37C25 64 15 52 15 35V16L40 6z"/><path fill="rgba(1,12,28,.92)" stroke="#fff" stroke-width="1.6" d="M27 30c0-8 6-14 14-14s14 6 14 14-6 14-14 14h-5l-9 7 2-10a14 14 0 0 1-2-11z"/><circle cx="34" cy="30" r="2.3" fill="#42e8ff"/><circle cx="41" cy="30" r="2.3" fill="#42e8ff"/><circle cx="48" cy="30" r="2.3" fill="#42e8ff"/></svg></div>

        <button data-nav="calls" type="button"><span>☎</span><span>Chamadas</span></button>

        <button data-nav="profile" type="button"><span>♙</span><span>Perfil</span></button>
      </nav>
    </main>

    <section id="chat" class="chat hidden">
      <header class="chatHeader">
        <button id="backBtn" class="iconBtn" type="button">←</button>
        <img id="peerAvatar" class="avatar" alt="" />

          <strong id="peerName"></strong>
          <div class="small"><span id="peerDot" class="statusDot"></span><span id="peerStatus">offline</span></div>
        </div>
        <button id="audioCallBtn" class="iconBtn" type="button">☎</button>
        <button id="videoCallBtn" class="iconBtn" type="button">▣</button>

      </header>

    <section id="callOverlay" class="callOverlay hidden">
      <div class="callCard">
        <img id="callAvatar" class="avatar bigAvatar" style="margin:0 auto 10px" alt="" />
        <h2 id="callTitle">Chamada</h2>
        <p id="callStatus" class="small">Conectando...</p>
        <div id="callVideos" class="callVideos hidden">
          <video id="remoteVideo" autoplay playsinline muted></video>
          <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <audio id="remoteAudio" autoplay></audio>
        <div id="callActions" class="callActions"></div>
      </div>
    </section>

    <div id="modal" class="modal hidden"><div id="modalCard" class="modalCard"></div></div>
    <div id="toast" class="toast hidden"></div>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((items) => items.forEach((item) => item.unregister()))
          .catch(() => {});
      }
      if (window.caches) {
        caches.keys()
          .then((keys) => keys.forEach((key) => caches.delete(key)))
          .catch(() => {});
      }

      const $ = (id) => document.getElementById(id);
      const enc = new TextEncoder();
      const dec = new TextDecoder();
      const state = {
        mode: "login",
        token: localStorage.getItem("arca_token") || "",
        user: null,
        avatar: localStorage.getItem("arca_avatar") || "",
        socket: null,
        rooms: [],
        currentRoom: null,
        roomKeys: new Map(),
        pending: [],
        qrStop: null,
        localStream: null,
        peerConnection: null,
        callRoom: null,
        pendingCall: null,
        pendingIce: [],
        callRetryTimer: null,
        activeCallId: "",
        seenCallSignals: new Set(),
        micMuted: false,
        videoReduced: false,
        mediaRecorder: null,
        audioChunks: [],
        replyDraft: null,
        pendingAudio: null,
        mediaObjectUrls: new Set(),
        roomsRefreshTimer: null,
        callPollTimer: null,
      };
      document.body.dataset.theme = localStorage.getItem("arca_theme") || "blue";

      function toast(text) {
        $("toast").textContent = text;
        $("toast").classList.remove("hidden");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => $("toast").classList.add("hidden"), 2600);
      }

      function cleanUsername(value) {
        return String(value || "").trim().toLowerCase().replace(/[^a-z0-9_.-]/g, "").slice(0, 32);
      }

      function api(path, body = {}) {
        return fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache",
            Authorization: "Bearer " + state.token,
          },
          cache: "no-store",
          body: JSON.stringify(body),
        }).then(async (res) => {
          const text = await res.text();
          try {
            return JSON.parse(text);
          } catch {
            return {
              error: `Resposta invalida do servidor (${res.status}). Recarregue o deploy.`,
              details: text.slice(0, 160),
            };
          }
        });
      }

      async function authRequest(path, body = {}) {
        const response = await fetch(path + "?t=" + Date.now(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache",
          },
          cache: "no-store",
          body: JSON.stringify(body),
        });
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          return {
            error: `Servidor respondeu sem JSON (${response.status}).`,
            details: text.slice(0, 160),
          };
        }
      }

      function safe(text) {
        return String(text || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[c]);
      }

      function time(ts) {
        return new Date(ts || Date.now()).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      }

      function avatarSrc(user) {
        return user?.avatar || "";
      }

      function setAvatar(img, user, fallback = "A") {
        const src = avatarSrc(user);
        if (src) {
          img.src = src;
          img.classList.remove("hidden");
          img.textContent = "";
        } else {
          img.removeAttribute("src");
          img.textContent = fallback;
        }
      }

      function bufToB64(buffer) {
        const bytes = new Uint8Array(buffer);
        let out = "";
        for (const byte of bytes) out += String.fromCharCode(byte);
        return btoa(out);
      }

      function b64ToBuf(text) {
        const bin = atob(text);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out.buffer;
      }

      async function getIdentityKeys(owner = "") {
        if (!window.crypto || !crypto.subtle || !crypto.getRandomValues) {
          throw new Error("Criptografia do navegador indisponivel neste aparelho.");
        }
        const scope = cleanUsername(owner || state.user?.username || $("username")?.value || "default");
        const storageKey = "arca_identity_keys_" + scope;
        const saved = localStorage.getItem(storageKey);
        if (saved) {
          const data = JSON.parse(saved);
          return {
            privateKey: await crypto.subtle.importKey("jwk", data.privateKey, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]),
            publicKey: await crypto.subtle.importKey("jwk", data.publicKey, { name: "ECDH", namedCurve: "P-256" }, true, []),
            publicJwk: data.publicKey,
          };
        }
        const pair = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
        const privateKey = await crypto.subtle.exportKey("jwk", pair.privateKey);
        const publicKey = await crypto.subtle.exportKey("jwk", pair.publicKey);
        localStorage.setItem(storageKey, JSON.stringify({ privateKey, publicKey }));
        return { privateKey: pair.privateKey, publicKey: pair.publicKey, publicJwk: publicKey };
      }

      async function deriveRoomKey(room) {
        if (state.roomKeys.has(room.roomId)) return state.roomKeys.get(room.roomId);
        if (!window.crypto || !crypto.subtle) {
          throw new Error("Criptografia indisponivel neste navegador.");
        }
        const ids = [state.user?.userId || "", room.peer?.userId || ""].sort().join("|");
        const roomSecret = ["ARCAIDRON-E2E-v2", room.roomId || "", room.pairHash || "", ids].join("|");
        const hash = await crypto.subtle.digest("SHA-256", enc.encode(roomSecret));
        const key = await crypto.subtle.importKey("raw", hash, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
        state.roomKeys.set(room.roomId, key);
        return key;
      }

      async function tryGetIdentityKeys(owner = "") {
        try {
          return await getIdentityKeys(owner);
        } catch (err) {
          console.warn("ARCAIDRON E2E indisponivel antes do login:", err?.message || err);
          return null;
        }
      }

      async function encryptForRoom(room, text) {
        const key = await deriveRoomKey(room);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
        return { cipher: bufToB64(cipher), iv: bufToB64(iv) };
      }

      async function decryptFromRoom(room, message) {
        if (message.deleted) return "Mensagem apagada";
        try {
          const key = await deriveRoomKey(room);
          const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBuf(message.iv) }, key, b64ToBuf(message.cipher));
          return dec.decode(plain);
        } catch {
          return "🔒 Mensagem protegida por outra chave";
        }
      }

      async function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      $("pickPhoto").onclick = () => $("photoInput").click();
      $("photoInput").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) return toast("Escolha uma imagem.");
        const dataUrl = await fileToDataUrl(file);
        state.avatar = dataUrl;
        localStorage.setItem("arca_avatar", dataUrl);
        $("authAvatarPreview").src = dataUrl;
        $("authAvatarPreview").classList.remove("hidden");
        $("authAvatarFallback").classList.add("hidden");
        if (state.token) await api("/api/update-profile", { avatar: dataUrl });
      };

      $("loginTab").onclick = () => setMode("login");
      $("registerTab").onclick = () => setMode("register");
      $("togglePass").onclick = () => {
        $("password").type = $("password").type === "password" ? "text" : "password";
      };
      $("username").value = localStorage.getItem("arca_last_login") || localStorage.getItem("arca_username") || "";
      $("username").addEventListener("keydown", (event) => {
        if (event.key === "Enter") $("password").focus();
      });
      $("password").addEventListener("keydown", (event) => {
        if (event.key === "Enter") $("authBtn").click();
      });
      window.activateFingerprint = async () => {
        if (!window.PublicKeyCredential || !state.token) {
          toast("Entre uma vez com senha para ativar acesso rapido neste aparelho.");
          return;
        }
        localStorage.setItem("arca_fingerprint_enabled", "true");
        toast("Acesso por digital ativado neste aparelho.");
        await boot();
      };

      function setMode(mode) {
        state.mode = mode;
        $("loginTab").classList.toggle("active", mode === "login");
        $("registerTab").classList.toggle("active", mode === "register");
        $("authBtn").textContent = mode === "login" ? "⚡ ENTRAR" : "🛡 CRIAR CONTA";
        $("authError").textContent = "";
      }

      function authErrorText(result) {
        const text = result?.details ? result.error + " " + result.details : result?.error;
        if (!text) return "Nao foi possivel entrar.";
        if (/nao encontrada|não encontrada/i.test(text)) return "Conta nao encontrada. Toque em CRIAR CONTA para cadastrar.";
        if (/senha/i.test(text)) return "Senha incorreta para esta conta.";
        return text;
      }

      $("authBtn").onclick = async () => {
        const username = cleanUsername($("username").value);
        const password = $("password").value;
        if (!username || !password) {
          $("authError").textContent = "Digite nome e senha.";
          return;
        }
        if (password.length < 6) {
          $("authError").textContent = "A senha precisa ter pelo menos 6 numeros ou letras.";
          return;
        }
        localStorage.removeItem("arca_token");
        localStorage.removeItem("arca_username");
        localStorage.removeItem("arca_userid");
        state.token = "";
        state.user = null;
        $("authBtn").disabled = true;
        const originalLabel = $("authBtn").textContent;
        $("authBtn").textContent = state.mode === "register" ? "CRIANDO..." : "ENTRANDO...";
        $("authError").textContent = "";
        const keys = await tryGetIdentityKeys(username);
        let result;
        try {
          result = await authRequest("/api/" + (state.mode === "register" ? "register" : "login"), {
            username,
            password,
            avatar: state.avatar,
            publicKey: keys ? keys.publicJwk : null,
          });
          if (result.error || !result.token) {
            const fallback = await authRequest("/api/auth", {
              mode: state.mode,
              username,
              password,
              avatar: state.avatar,
              publicKey: keys ? keys.publicJwk : null,
            });
            if (fallback?.token && !fallback.error) result = fallback;
          }
        } catch (err) {
          $("authBtn").disabled = false;
          $("authBtn").textContent = originalLabel;
          $("authError").textContent = "Nao foi possivel conectar ao servidor.";
          return;
        }
        $("authBtn").disabled = false;
        $("authBtn").textContent = originalLabel;
        if (result.error || !result.token) {
          const message = authErrorText(result);
          if (/Conta nao encontrada/i.test(message)) setMode("register");
          $("authError").textContent = message;
          return;
        }
        const user = result.user || {
          username: result.username,
          account: result.account || result.username,
          userId: result.userId,
          avatar: result.avatar || "",
          publicKey: result.publicKey || (keys ? keys.publicJwk : null),
        };
        state.token = result.token;
        state.user = user;
        localStorage.setItem("arca_token", state.token);
        localStorage.setItem("arca_username", state.user.username);
        localStorage.setItem("arca_last_login", username);
        localStorage.setItem("arca_userid", state.user.userId);
        if (state.user.avatar) localStorage.setItem("arca_avatar", state.user.avatar);
        await showMain();
      };

      async function boot() {
        if (!state.token) return;
        const result = await api("/api/me");
        if (result.error) return;
        state.user = result.user;
        if (state.user.avatar) {
          state.avatar = state.user.avatar;
          localStorage.setItem("arca_avatar", state.avatar);
        }
        const keys = await tryGetIdentityKeys(state.user.username);
        if (keys && !state.user.publicKey) {
          const updated = await api("/api/update-profile", { publicKey: keys.publicJwk });
          if (updated.user) state.user = updated.user;
        }
        await showMain();
      }

      async function showMain() {
        $("auth").classList.add("hidden");
        $("main").classList.remove("hidden");
        connectSocket();
        await refreshRooms();
        renderHome("home");
      }

      function logout() {
        localStorage.removeItem("arca_token");
        state.token = "";
        location.reload();
      }

      function connectSocket() {
        if (state.socket) state.socket.disconnect();
        state.socket = io({
          auth: { token: state.token },
          transports: ["websocket", "polling"],
          upgrade: true,
          rememberUpgrade: true,
          reconnection: true,
          reconnectionAttempts: Infinity,
          reconnectionDelay: 150,
          reconnectionDelayMax: 900,
          timeout: 3500,
        });
        state.socket.on("connect", () => {
          if (state.currentRoom) joinRoom(state.currentRoom);
          fetchPendingCalls().catch(() => {});
        });
        state.socket.on("room:history", async ({ roomId, messages }) => {
          if (!state.currentRoom || state.currentRoom.roomId !== roomId) return;
          await renderMessages(messages || []);
        });
        state.socket.on("message:new", async (message) => {
          if (state.currentRoom && message.roomId === state.currentRoom.roomId) {
            await appendMessage(message);
            if (message.from !== state.user.username && message.from !== state.user.account) {
              state.socket.emit("message:seen", { roomId: message.roomId, id: message.id });
            }
          }
          scheduleRoomsRefresh();
        });
        state.socket.on("message:deleted", ({ id }) => {
          const row = document.querySelector(`[data-message-id="${CSS.escape(id)}"] .bubble`);
          if (row) row.innerHTML = `<span class="bubbleText">Mensagem apagada</span>`;
        });
        state.socket.on("message:seen", ({ id }) => {
          const marker = document.querySelector(`[data-message-id="${CSS.escape(id)}"] .seen`);
          if (marker) marker.textContent = " ✓✓";
        });
        state.socket.on("presence:update", ({ user }) => {
          updatePresence(user);
        });
        state.socket.on("typing", ({ username, typing }) => {
          if (state.currentRoom && username === state.currentRoom.peer.username) {
            $("peerStatus").textContent = typing ? "digitando..." : statusText(state.currentRoom.peer);
          }
        });
        state.socket.on("call:signal", handleCallSignal);
        clearInterval(state.callPollTimer);
        state.callPollTimer = setInterval(() => fetchPendingCalls().catch(() => {}), 2200);
      }

      async function refreshRooms() {
        const result = await api("/api/rooms");
        if (result.error) return toast(result.error);
        state.rooms = result.rooms || [];
        if (result.user) state.user = result.user;
      }

      async function fetchPendingCalls() {
        if (!state.token || state.pendingCall || state.peerConnection) return;
        const result = await api("/api/pending-calls");
        if (result.error) return;
        for (const call of result.calls || []) await handleCallSignal(call);
      }

      function scheduleRoomsRefresh() {
        clearTimeout(state.roomsRefreshTimer);
        state.roomsRefreshTimer = setTimeout(() => {
          refreshRooms().catch(() => {});
        }, 500);
      }

      function renderHome(section = "home") {
        document.querySelectorAll(".nav button").forEach((btn) => btn.classList.toggle("active", btn.dataset.nav === section));
        if (section === "profile") return renderProfile();
        if (section === "files") return renderFiles();
        if (section === "calls") return renderCalls();
        const rooms = state.rooms;
        $("homeView").innerHTML = `
          <div class="profileCard">
            <div class="profileGrid">
              <img id="meAvatar" class="avatar bigAvatar" alt="" />
              <div>
                <strong style="font-size:22px">${safe(state.user.username)}</strong>
                <div class="idLine">ID: <span id="myId">${safe(state.user.userId)}</span></div>
              </div>
              <button class="iconBtn" onclick="copyId()">▣</button>
            </div>
          </div>
          <div class="actions">
            <button class="action" onclick="showAddFriend()">${iconUser()}<span>Novo amigo</span></button>
            <button class="action" onclick="renderHome('chats')">${iconChat()}<span>Bate-papo</span></button>
            <button class="action" onclick="showVault()">${iconLock()}<span>Cofre privado</span></button>
            <button class="action" onclick="showSettings()">${iconGear()}<span>Configurações</span></button>
          </div>
          <div class="panel">
            <h3>${section === "chats" ? "Bate-papo" : "Conversas"}</h3>
            <div id="rooms"></div>
          </div>
        `;
        setAvatar($("meAvatar"), state.user, "A");
        renderRooms(rooms);
      }

      function renderRooms(rooms) {
        const box = $("rooms");
        if (!box) return;
        if (!rooms.length) {
          box.innerHTML = `<div class="small">Nenhum contato ainda. Adicione pelo ID unico.</div>`;
          return;
        }
        box.innerHTML = rooms.map((room, index) => `
          <div class="room" onclick="openRoomByIndex(${index})">
            <img class="avatar" src="${safe(room.peer.avatar || "")}" alt="" onerror="this.removeAttribute('src');this.textContent='${safe((room.peer.username || 'A')[0].toUpperCase())}'" />
            <div>
              <strong>${safe(room.peer.username)}</strong>
              <div class="small"><span class="statusDot ${room.peer.online ? "online" : ""}"></span>${statusText(room.peer)}</div>
            </div>
            <button class="iconBtn" onclick="event.stopPropagation();hideContact(${index})">⌫</button>
          </div>
        `).join("");
      }

      function statusText(user) {
        if (!user) return "offline";
        if (user.online) return "online agora";
        if (user.lastSeen) return "visto por ultimo as " + time(user.lastSeen);
        return "offline";
      }

      function updatePresence(user) {
        if (!user) return;
        for (const room of state.rooms) {
          if (room.peer.userId === user.userId) {
            room.peer = { ...room.peer, ...user };
          }
        }
        if (state.currentRoom && state.currentRoom.peer.userId === user.userId) {
          state.currentRoom.peer = { ...state.currentRoom.peer, ...user };
          $("peerDot").classList.toggle("online", !!user.online);
          $("peerStatus").textContent = statusText(user);
        }
      }

      window.copyId = async () => {
        await navigator.clipboard.writeText(state.user.userId);
        toast("ID copiado.");
      };

      window.showAddFriend = () => {
        showModal(`
          <h3>Adicionar amigo por ID</h3>
          <p class="small">A sala sera criada pela uniao do seu ID com o ID do contato.</p>
          <div class="inputLine">
            <input id="friendId" class="input" placeholder="arc_..." />
            <button class="iconBtn" onclick="addFriend()">+</button>
          </div>
          <button class="ghost" style="width:100%;margin-top:14px" onclick="scanFriendQr()">Escanear QR Code</button>
          <video id="qrVideo" class="hidden" playsinline style="width:100%;margin-top:14px;border-radius:18px;border:1px solid rgba(0,160,255,.45);background:#001326"></video>
          <button id="qrBackBtn" class="ghost hidden" style="width:100%;margin-top:10px" onclick="stopQrScan()">Voltar</button>
          <button class="ghost" style="width:100%;margin-top:10px" onclick="hideModal()">Fechar</button>
        `);
      };

      window.stopQrScan = () => {
        if (state.qrStop) state.qrStop();
        state.qrStop = null;
      };

      window.scanFriendQr = async () => {
        const video = $("qrVideo");
        const backBtn = $("qrBackBtn");
        if (!navigator.mediaDevices?.getUserMedia || !("BarcodeDetector" in window)) {
          toast("Leitor QR indisponivel neste navegador. Digite o ID.");
          return;
        }
        let stream;
        let timer;
        const stop = () => {
          if (timer) clearInterval(timer);
          if (stream) stream.getTracks().forEach((track) => track.stop());
          if (video) {
            video.pause();
            video.srcObject = null;
            video.classList.add("hidden");
          }
          if (backBtn) backBtn.classList.add("hidden");
          state.qrStop = null;
        };
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
          state.qrStop = stop;
          video.srcObject = stream;
          video.classList.remove("hidden");
          if (backBtn) backBtn.classList.remove("hidden");
          await video.play();
          const detector = new BarcodeDetector({ formats: ["qr_code"] });
          timer = setInterval(async () => {
            try {
              const codes = await detector.detect(video);
              if (!codes.length) return;
              const raw = String(codes[0].rawValue || "").trim();
              const id = raw.replace(/^arcaidron:\/\/user\//i, "").trim();
              if (!id) return;
              $("friendId").value = id;
              stop();
              toast("ID lido pelo QR Code.");
            } catch (err) {
              console.warn("Falha ao ler QR:", err?.message || err);
            }
          }, 450);
          setTimeout(stop, 30000);
        } catch (err) {
          stop();
          toast("Nao foi possivel abrir a camera.");
        }
      };

      window.addFriend = async () => {
        const userId = $("friendId").value.trim();
        const result = await api("/api/add-friend", { userId });
        if (result.error) return toast(result.error);
        hideModal();
        await refreshRooms();
        renderHome("chats");
        const index = state.rooms.findIndex((room) => room.roomId === result.room.roomId);
        if (index >= 0) openRoomByIndex(index);
      };

      window.openRoomByIndex = async (index) => {
        const room = state.rooms[index];
        if (!room) return toast("Sala nao encontrada.");
        state.currentRoom = room;
        $("chat").classList.remove("hidden");
        $("peerName").textContent = room.peer.username;
        setAvatar($("peerAvatar"), room.peer, (room.peer.username || "A")[0].toUpperCase());
        $("peerDot").classList.toggle("online", !!room.peer.online);
        $("peerStatus").textContent = statusText(room.peer);
        $("messageList").innerHTML = `<div class="dayPill">Hoje</div>`;
        try {
          await deriveRoomKey(room);
        } catch (err) {
          toast(err.message || "Chave do contato indisponivel.");
          return;
        }
        joinRoom(room);
        const history = await api("/api/history", { roomId: room.roomId });
        if (history.messages) await renderMessages(history.messages);
      };

      function joinRoom(room) {
        if (!state.socket || !state.socket.connected) return;
        state.socket.emit("room:join", { roomId: room.roomId });
      }

      async function renderMessages(messages) {
        revokeMediaObjectUrls();
        $("messageList").innerHTML = `<div class="dayPill">Hoje</div>`;
        const visibleMessages = messages.filter((message) => !isLocallyCleared(message));
        for (const message of visibleMessages) await appendMessage(message);
        $("messageList").scrollTop = $("messageList").scrollHeight;
      }

      function clearKey(roomId = state.currentRoom?.roomId) {
        const userId = state.user?.userId || state.user?.username || "local";
        return "arca_clear_" + userId + "_" + roomId;
      }

      function isLocallyCleared(message) {
        if (!message?.roomId) return false;
        const clearedAt = Number(localStorage.getItem(clearKey(message.roomId)) || 0);
        return clearedAt && Number(message.createdAt || 0) <= clearedAt;
      }

      async function appendMessage(message) {
        if (!state.currentRoom || message.roomId !== state.currentRoom.roomId) return;
        if (document.querySelector(`[data-message-id="${CSS.escape(message.id)}"]`)) return;
        const mine = message.from === state.user.username || message.from === state.user.account;
        const text = await decryptFromRoom(state.currentRoom, message);
        const parsed = parseMessagePayload(message, text);
        const row = document.createElement("div");
        row.className = "bubbleRow " + (mine ? "mine" : "them");
        row.dataset.messageId = message.id;
        const avatar = !mine ? `<img class="avatar" style="width:34px;height:34px" src="${safe(state.currentRoom.peer.avatar || "")}" alt="">` : "";
        const content = renderMessageContent(message, parsed);
        row.innerHTML = `
          ${avatar}
          <div class="bubble ${mine ? "" : "them"}" onclick="showMessageActions('${safe(message.id)}')">
            <button class="replyBtn" type="button" onclick="event.stopPropagation(); startReply('${safe(message.id)}')">↩</button>
            ${content}
            <span class="time">${time(message.createdAt)}<span class="seen">${mine ? " ✓" : ""}</span></span>
          </div>
        `;
        row._replyText = parsed.text || "Audio";
        row._replyFrom = mine ? "Voce" : state.currentRoom.peer.username;
        $("messageList").appendChild(row);
        hydrateMessageMedia(row, parsed).catch(() => {});
        $("messageList").scrollTop = $("messageList").scrollHeight;
      }

      function parseMessagePayload(message, text) {
        try {
          const data = JSON.parse(text);
          if (data && typeof data === "object" && data.kind) {
            return {
              kind: data.kind,
              text: data.text || "",
              dataUrl: data.dataUrl || "",
              mime: data.mime || "",
              name: data.name || "",
              size: Number(data.size || 0),
              reply: data.reply || null,
            };
          }
        } catch {}
        return { kind: message.type || "text", text, dataUrl: "", mime: "", name: "", size: 0, reply: null };
      }

      function renderMessageContent(message, parsed) {
        const quote = parsed.reply
          ? `<span class="replyQuote"><strong>${safe(parsed.reply.from || "Mensagem")}</strong><br>${safe(parsed.reply.text || "")}</span>`
          : "";
        if (message.type === "audio") {
          if (parsed.dataUrl) return `${quote}<audio class="audioMessage" controls preload="metadata" src="${safe(parsed.dataUrl)}"></audio>`;
        }
        if (message.type === "file" || parsed.text.startsWith("[arquivo:")) {
          return quote + renderFilePreview(parsed);
        }
        return `${quote}<span class="bubbleText">${safe(parsed.text)}</span>`;
      }

      function fileNameFromPayload(parsed) {
        const fromText = String(parsed.text || "").match(/^\[arquivo:(.+?)\]/);
        return String(parsed.name || (fromText ? fromText[1] : "arquivo")).trim() || "arquivo";
      }

      function mimeFromPayload(parsed) {
        if (parsed.mime) return parsed.mime;
        const match = String(parsed.dataUrl || "").match(/^data:([^;,]+)/);
        return match ? match[1] : "application/octet-stream";
      }

      function formatBytes(bytes) {
        const value = Number(bytes || 0);
        if (!value) return "";
        if (value < 1024) return `${value} B`;
        if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
        return `${(value / 1024 / 1024).toFixed(1)} MB`;
      }

      function renderFilePreview(parsed) {
        const dataUrl = String(parsed.dataUrl || "");
        const name = fileNameFromPayload(parsed);
        const mime = mimeFromPayload(parsed);
        const size = formatBytes(parsed.size);
        const label = size ? `${name} · ${size}` : name;
        if (!dataUrl) {
          return `<span class="bubbleText">Arquivo protegido: ${safe(name)}</span>`;
        }
        const lowerName = name.toLowerCase();
        const looksImage = mime.startsWith("image/") || /\.(png|jpe?g|gif|webp|bmp)$/i.test(lowerName);
        const looksVideo = mime.startsWith("video/") || /\.(mp4|webm|mov|m4v|3gp|mkv)$/i.test(lowerName);
        const looksAudio = mime.startsWith("audio/") || /\.(mp3|m4a|aac|ogg|oga|wav|webm)$/i.test(lowerName);
        if (looksImage) {
          return `
            <span class="filePreview">
              <a href="${safe(dataUrl)}" download="${safe(name)}"><img class="fileImage" src="${safe(dataUrl)}" alt="${safe(name)}" loading="lazy" /></a>
              <span class="fileCaption">${safe(label)}</span>
            </span>
          `;
        }
        if (looksVideo) {
          return `
            <span class="filePreview">
              <video class="fileVideo" controls playsinline preload="metadata" data-file-media="video"></video>
              <a class="fileCaption" href="#" data-file-download download="${safe(name)}">Baixar ${safe(label)}</a>
            </span>
          `;
        }
        if (looksAudio) {
          return `
            <span class="filePreview">
              <audio class="audioMessage" controls preload="metadata" data-file-media="audio"></audio>
              <a class="fileCaption" href="#" data-file-download download="${safe(name)}">Baixar ${safe(label)}</a>
            </span>
          `;
        }
        const isPdf = mime === "application/pdf" || name.toLowerCase().endsWith(".pdf");
        return `
          <a class="fileDocument" href="#" data-file-download download="${safe(name)}" target="_blank" rel="noopener">
            <span class="fileIcon">${isPdf ? "PDF" : "DOC"}</span>
            <span>
              <strong>${safe(name)}</strong>
              <span class="fileHint">${safe(size || mime)} · tocar para abrir ou baixar</span>
            </span>
          </a>
        `;
      }

      async function hydrateMessageMedia(row, parsed) {
        const dataUrl = String(parsed.dataUrl || "");
        if (!dataUrl) return;
        const media = row.querySelector("[data-file-media]");
        const download = row.querySelector("[data-file-download]");
        if (!media && !download) return;
        const url = await dataUrlToObjectUrl(dataUrl);
        if (media) {
          media.src = url;
          media.load?.();
        }
        if (download) download.href = url;
      }

      async function dataUrlToObjectUrl(dataUrl) {
        const response = await fetch(dataUrl);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        state.mediaObjectUrls.add(url);
        return url;
      }

      function revokeMediaObjectUrls() {
        for (const url of state.mediaObjectUrls) URL.revokeObjectURL(url);
        state.mediaObjectUrls.clear();
      }

      window.startReply = (id) => {
        const row = document.querySelector(`[data-message-id="${CSS.escape(id)}"]`);
        if (!row) return;
        const text = String(row._replyText || "Mensagem").slice(0, 140);
        const from = String(row._replyFrom || "Contato");
        state.replyDraft = { id, text, from };
        $("replyText").innerHTML = `<strong>Respondendo ${safe(from)}</strong><br>${safe(text)}`;
        $("replyBar").classList.remove("hidden");
        $("messageInput").focus();
      };

      window.cancelReply = () => {
        state.replyDraft = null;
        $("replyBar").classList.add("hidden");
        $("replyText").textContent = "";
      };

      window.showMessageActions = (id) => {
        const row = document.querySelector(`[data-message-id="${CSS.escape(id)}"]`);
        if (!row) return;
        showModal(`
          <h3>Mensagem</h3>
          <p class="small">${safe(String(row._replyText || "Mensagem").slice(0, 120))}</p>
          <button class="ghost" onclick="startReply('${safe(id)}'); hideModal()">Responder</button>
          <button class="primary danger" style="margin-top:10px" onclick="deleteMessage('${safe(id)}')">Apagar para todos</button>
          <button class="ghost" style="margin-top:10px" onclick="hideModal()">Fechar</button>
        `);
      };

      $("sendBtn").onclick = sendText;
      $("messageInput").onkeydown = (event) => {
        if (event.key === "Enter") sendText();
      };
      $("messageInput").oninput = () => {
        if (state.currentRoom && state.socket) {
          state.socket.volatile.emit("typing", { roomId: state.currentRoom.roomId, typing: true });
          clearTimeout($("messageInput").typingTimer);
          $("messageInput").typingTimer = setTimeout(() => {
            state.socket.volatile.emit("typing", { roomId: state.currentRoom.roomId, typing: false });
          }, 700);
        }
      };

      async function sendText() {
        const text = $("messageInput").value.trim();
        if (!state.currentRoom) return toast("Abra uma conversa.");
        if (!text) return;
        await sendEncryptedMessage("text", buildMessagePayload("text", { text }));
        $("messageInput").value = "";
        cancelReply();
      }

      async function sendEncryptedMessage(type, payload) {
        const encrypted = await encryptForRoom(state.currentRoom, payload);
        const message = {
          id: crypto.randomUUID(),
          roomId: state.currentRoom.roomId,
          from: state.user.username,
          type,
          replyTo: state.replyDraft?.id || "",
          ...encrypted,
          createdAt: Date.now(),
        };
        await appendMessage(message);
        state.socket.timeout(7000).emit("message:send", message, (err, ack) => {
          if (err || !ack || ack.error) toast(ack?.error || "Falha ao confirmar envio. A mensagem sera reenviada ao reconectar.");
        });
      }

      function buildMessagePayload(kind, data = {}) {
        return JSON.stringify({
          kind,
          ...data,
          reply: state.replyDraft ? { ...state.replyDraft } : null,
        });
      }

      window.deleteMessage = (id) => {
        if (!state.currentRoom) return;
        if (!confirm("Apagar esta mensagem para todos?")) return;
        state.socket.emit("message:delete", { roomId: state.currentRoom.roomId, id });
        hideModal();
      };

      $("backBtn").onclick = () => {
        $("chat").classList.add("hidden");
        state.currentRoom = null;
        revokeMediaObjectUrls();
        cancelReply();
        refreshRooms().then(() => renderHome("chats"));
      };

      $("attachBtn").onclick = () => $("fileInput").click();
      $("fileInput").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const maxBytes = 70 * 1024 * 1024;
        if (file.size > maxBytes) {
          event.target.value = "";
          return toast("Arquivo muito grande. Envie ate 70 MB por mensagem.");
        }
        const dataUrl = await fileToDataUrl(file);
        await sendEncryptedMessage("file", buildMessagePayload("file", {
          text: `[arquivo:${file.name}]`,
          name: file.name,
          size: file.size,
          dataUrl,
          mime: file.type || "application/octet-stream",
        }));
        cancelReply();
        event.target.value = "";
      };

      $("recordBtn").onclick = async () => {
        if (!navigator.mediaDevices?.getUserMedia) return toast("Microfone indisponivel.");
        if (!window.MediaRecorder) return toast("Gravacao de audio indisponivel neste navegador.");
        if (!state.currentRoom) return toast("Abra uma conversa.");
        if (state.mediaRecorder && state.mediaRecorder.state === "recording") {
          state.mediaRecorder.stop();
          $("recordBtn").textContent = "🎙";
          toast("Audio gravado. Escute antes de enviar.");
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          state.audioChunks = [];
          state.mediaRecorder = new MediaRecorder(stream);
          state.mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size) state.audioChunks.push(event.data);
          };
          state.mediaRecorder.onstop = async () => {
            stream.getTracks().forEach((track) => track.stop());
            const blob = new Blob(state.audioChunks, { type: state.mediaRecorder.mimeType || "audio/webm" });
            const dataUrl = await fileToDataUrl(blob);
            state.pendingAudio = { mime: blob.type, dataUrl };
            state.audioChunks = [];
            state.mediaRecorder = null;
            showAudioPreview();
          };
          state.mediaRecorder.start();
          $("recordBtn").textContent = "■";
          toast("Gravando audio... toque no microfone para enviar.");
        } catch (err) {
          toast("Permita o microfone para gravar audio.");
        }
      };

      function showAudioPreview() {
        if (!state.pendingAudio) return;
        showModal(`
          <h3>Prévia do áudio</h3>
          <p class="small">Escute antes de enviar.</p>
          <audio class="audioMessage" style="width:100%;margin:14px 0" controls preload="metadata" src="${safe(state.pendingAudio.dataUrl)}"></audio>
          <div class="callActions">
            <button class="primary" onclick="sendPendingAudio()">Enviar</button>
            <button class="primary danger" onclick="cancelPendingAudio()">Cancelar</button>
          </div>
        `);
      }

      window.sendPendingAudio = async () => {
        if (!state.pendingAudio) return;
        await sendEncryptedMessage("audio", buildMessagePayload("audio", {
          text: "Audio",
          mime: state.pendingAudio.mime,
          dataUrl: state.pendingAudio.dataUrl,
        }));
        state.pendingAudio = null;
        cancelReply();
        hideModal();
      };

      window.cancelPendingAudio = () => {
        state.pendingAudio = null;
        hideModal();
        toast("Audio cancelado.");
      };

      $("audioCallBtn").onclick = () => startCall(false);
      $("videoCallBtn").onclick = () => startCall(true);

      function setCallUi({ title, status, avatar, video, actions }) {
        $("callTitle").textContent = title || "Chamada";
        $("callStatus").textContent = status || "Conectando...";
        setAvatar($("callAvatar"), avatar || state.currentRoom?.peer || state.callRoom?.peer || {}, "A");
        $("callVideos").classList.toggle("hidden", !video);
        $("callActions").innerHTML = actions || "";
        $("callOverlay").classList.remove("hidden");
      }

      function callControlButtons() {
        return `
          <button id="muteBtn" class="ghost" onclick="toggleMute()">Mudo</button>
          <button class="primary danger" onclick="endCall()">Encerrar</button>
          <button class="ghost" onclick="endCall(false)">Fechar</button>
        `;
      }

      function updateMuteButton() {
        const btn = $("muteBtn");
        if (!btn) return;
        btn.textContent = state.micMuted ? "Com som" : "Mudo";
        btn.classList.toggle("danger", state.micMuted);
      }

      window.toggleMute = () => {
        if (!state.localStream) return toast("Microfone ainda conectando.");
        state.micMuted = !state.micMuted;
        state.localStream.getAudioTracks().forEach((track) => {
          track.enabled = !state.micMuted;
        });
        updateMuteButton();
        toast(state.micMuted ? "Seu microfone esta mudo." : "Seu microfone voltou.");
      };

      function hideCallUi() {
        $("callOverlay").classList.add("hidden");
        $("remoteVideo").srcObject = null;
        $("localVideo").srcObject = null;
        $("remoteAudio").srcObject = null;
        $("callActions").innerHTML = "";
      }

      function closePeerConnection() {
        if (state.callRetryTimer) clearInterval(state.callRetryTimer);
        state.callRetryTimer = null;
        state.activeCallId = "";
        if (state.peerConnection) {
          state.peerConnection.ontrack = null;
          state.peerConnection.onicecandidate = null;
          state.peerConnection.close();
        }
        state.peerConnection = null;
        if (state.localStream) state.localStream.getTracks().forEach((track) => track.stop());
        state.localStream = null;
        state.micMuted = false;
        state.pendingIce = [];
      }

      window.endCall = (notify = true) => {
        const roomId = state.callRoom?.roomId || state.currentRoom?.roomId;
        if (notify && roomId && state.socket) emitCallSignal({ roomId, type: "hang", callId: state.activeCallId || state.pendingCall?.callId || "" });
        closePeerConnection();
        state.callRoom = null;
        state.pendingCall = null;
        hideCallUi();
      };

      function createPeer(room, video) {
        state.callRoom = room;
        state.videoReduced = false;
        state.peerConnection = new RTCPeerConnection({
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            { urls: "stun:stun2.l.google.com:19302" },
          ],
          bundlePolicy: "max-bundle",
          rtcpMuxPolicy: "require",
          iceCandidatePoolSize: 4,
        });
        state.peerConnection.onicecandidate = (event) => {
          if (event.candidate) emitCallSignal({ roomId: room.roomId, type: "ice", candidate: event.candidate, callId: state.activeCallId || state.pendingCall?.callId || "" });
        };
        state.peerConnection.ontrack = (event) => {
          const [stream] = event.streams;
          if (stream) {
            if (event.track.kind === "video") {
              $("remoteVideo").srcObject = stream;
              $("remoteVideo").play().catch(() => {});
            }
            if (event.track.kind === "audio") {
              $("remoteAudio").srcObject = stream;
              $("remoteAudio").play().catch(() => toast("Toque na tela para liberar o audio da chamada."));
            }
          }
          $("callStatus").textContent = video ? "Video conectado" : "Voz conectada";
        };
        state.peerConnection.onconnectionstatechange = () => {
          const status = state.peerConnection?.connectionState;
          if (status === "connected") $("callStatus").textContent = video ? "Video conectado" : "Voz conectada";
          if (status === "disconnected" && video) {
            $("callStatus").textContent = "Ajustando video para internet fraca...";
            reduceVideoLoad();
          }
          if (["failed", "closed"].includes(status)) window.endCall(false);
        };
        state.peerConnection.oniceconnectionstatechange = () => {
          const status = state.peerConnection?.iceConnectionState;
          if (status === "checking") $("callStatus").textContent = "Conectando midia...";
          if (status === "connected" || status === "completed") $("callStatus").textContent = video ? "Video conectado" : "Voz conectada";
          if (status === "disconnected" && video) reduceVideoLoad();
          if (status === "failed") {
            state.peerConnection?.restartIce?.();
            if (video) reduceVideoLoad();
          }
        };
      }

      async function reduceVideoLoad() {
        if (state.videoReduced) return;
        state.videoReduced = true;
        const videoTrack = state.localStream?.getVideoTracks?.()[0];
        if (videoTrack?.applyConstraints) {
          await videoTrack.applyConstraints({
            width: { ideal: 480, max: 640 },
            height: { ideal: 270, max: 360 },
            frameRate: { ideal: 20, max: 24 },
          }).catch(() => {});
        }
        const sender = state.peerConnection?.getSenders?.().find((item) => item.track?.kind === "video");
        if (!sender?.getParameters || !sender?.setParameters) return;
        const params = sender.getParameters();
        params.encodings = params.encodings && params.encodings.length ? params.encodings : [{}];
        params.degradationPreference = "balanced";
        params.encodings[0].maxBitrate = 650000;
        params.encodings[0].maxFramerate = 24;
        params.encodings[0].scaleResolutionDownBy = 1;
        await sender.setParameters(params).catch(() => {});
      }

      async function flushPendingIce() {
        if (!state.peerConnection?.remoteDescription) return;
        const pending = state.pendingIce.splice(0);
        for (const candidate of pending) {
          await state.peerConnection.addIceCandidate(candidate).catch(() => {});
        }
      }

      async function prepareLocalMedia(video) {
        state.localStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1, sampleRate: 48000 },
          video: video ? {
            width: { ideal: 540, max: 720 },
            height: { ideal: 360, max: 480 },
            frameRate: { ideal: 24, max: 24 },
            facingMode: "user",
          } : false,
        });
        $("localVideo").srcObject = state.localStream;
        $("localVideo").play().catch(() => {});
        state.localStream.getAudioTracks().forEach((track) => {
          track.enabled = !state.micMuted;
        });
        state.localStream.getTracks().forEach((track) => {
          const sender = state.peerConnection.addTrack(track, state.localStream);
          tuneSenderForWeakNetwork(sender, track.kind);
        });
        updateMuteButton();
      }

      async function tuneSenderForWeakNetwork(sender, kind) {
        if (!sender?.getParameters || !sender?.setParameters) return;
        const params = sender.getParameters();
        params.encodings = params.encodings && params.encodings.length ? params.encodings : [{}];
        if (kind === "video") {
          params.degradationPreference = "balanced";
          params.encodings[0].maxBitrate = 900000;
          params.encodings[0].maxFramerate = 24;
          params.encodings[0].scaleResolutionDownBy = 1;
        }
        if (kind === "audio") {
          params.encodings[0].maxBitrate = 48000;
        }
        await sender.setParameters(params).catch(() => {});
      }

      function emitCallSignal(payload, callback) {
        if (!state.socket?.connected) {
          toast("Reconectando chamada...");
          state.socket?.connect();
        }
        state.socket.timeout(2500).emit("call:signal", payload, (err, ack) => {
          if (callback) callback(err, ack);
        });
      }

      function startOfferRetry(payload) {
        if (state.callRetryTimer) clearInterval(state.callRetryTimer);
        let attempts = 0;
        const sendOffer = () => {
          attempts += 1;
          emitCallSignal(payload, (err, ack) => {
            if (!err && ack?.delivered) $("callStatus").textContent = "Chamando...";
            if (!err && ack?.ringing) {
              $("callStatus").textContent = "Tocando no aparelho...";
              clearInterval(state.callRetryTimer);
              state.callRetryTimer = null;
            }
          });
          if (attempts >= 8) {
            clearInterval(state.callRetryTimer);
            state.callRetryTimer = null;
          }
        };
        sendOffer();
        state.callRetryTimer = setInterval(sendOffer, 650);
      }

      async function startCall(video) {
        if (!state.currentRoom) return;
        if (!navigator.mediaDevices?.getUserMedia) return toast("Camera/microfone indisponivel.");
        try {
          window.endCall(false);
          state.micMuted = false;
          const room = state.currentRoom;
          state.activeCallId = crypto.randomUUID();
          setCallUi({
            title: video ? "Chamando por video" : "Chamando por voz",
            status: `${room.peer.username} esta sendo chamado...`,
            avatar: room.peer,
            video,
            actions: callControlButtons(),
          });
          createPeer(room, video);
          await prepareLocalMedia(video);
          const offer = await state.peerConnection.createOffer();
          await state.peerConnection.setLocalDescription(offer);
          startOfferRetry({ roomId: room.roomId, type: "offer", offer, video, callId: state.activeCallId });
        } catch (err) {
          window.endCall(false);
          toast(video ? "Nao foi possivel iniciar o video." : "Nao foi possivel iniciar a chamada de voz.");
        }
      }

      async function roomForSignal(roomId) {
        let room = state.currentRoom?.roomId === roomId ? state.currentRoom : state.rooms.find((item) => item.roomId === roomId);
        if (!room) {
          await refreshRooms();
          room = state.rooms.find((item) => item.roomId === roomId);
        }
        return room;
      }

      async function answerIncomingCall() {
        const data = state.pendingCall;
        if (!data) return;
        const room = await roomForSignal(data.roomId);
        if (!room) return toast("Sala da chamada nao encontrada.");
        try {
          state.micMuted = false;
          setCallUi({
            title: data.video ? "Video em andamento" : "Chamada de voz",
            status: "Conectando...",
            avatar: data.fromUser || room.peer,
            video: !!data.video,
            actions: callControlButtons(),
          });
          closePeerConnection();
          createPeer(room, !!data.video);
          await prepareLocalMedia(!!data.video);
          await state.peerConnection.setRemoteDescription(data.offer);
          const answer = await state.peerConnection.createAnswer();
          await state.peerConnection.setLocalDescription(answer);
          emitCallSignal({ roomId: data.roomId, type: "answer", answer, callId: data.callId || "" });
          await flushPendingIce();
          state.pendingCall = null;
        } catch (err) {
          window.endCall();
          toast("Nao foi possivel atender a chamada.");
        }
      }

      window.answerIncomingCall = answerIncomingCall;
      window.declineIncomingCall = () => {
        if (state.pendingCall) emitCallSignal({ roomId: state.pendingCall.roomId, type: "decline", callId: state.pendingCall.callId || "" });
        state.pendingCall = null;
        hideCallUi();
      };

      async function handleCallSignal(data) {
        if (!data?.roomId || data.from === state.user?.account || data.from === state.user?.username) return;
        if (data.signalId) {
          if (state.seenCallSignals.has(data.signalId)) return;
          state.seenCallSignals.add(data.signalId);
          if (state.seenCallSignals.size > 120) state.seenCallSignals.clear();
        }
        const room = await roomForSignal(data.roomId);
        if (!room) return;
        if (data.type === "offer") {
          if (state.pendingCall?.callId === data.callId) {
            emitCallSignal({ roomId: data.roomId, type: "ringing", callId: data.callId || "" });
            return;
          }
          if (state.peerConnection && state.activeCallId === data.callId) return;
          state.pendingCall = data;
          state.activeCallId = data.callId || "";
          state.callRoom = room;
          setCallUi({
            title: data.video ? "Chamada de video" : "Chamada de voz",
            status: `${data.fromUser?.username || room.peer.username} esta chamando`,
            avatar: data.fromUser || room.peer,
            video: false,
            actions: `<button class="primary" onclick="answerIncomingCall()">Atender</button><button class="primary danger" onclick="declineIncomingCall()">Recusar</button>`,
          });
          emitCallSignal({ roomId: data.roomId, type: "ringing", callId: data.callId || "" });
          return;
        }
        if (data.type === "ringing") {
          if (data.callId && state.activeCallId && data.callId !== state.activeCallId) return;
          if (state.callRetryTimer) clearInterval(state.callRetryTimer);
          state.callRetryTimer = null;
          $("callStatus").textContent = "Tocando no aparelho...";
          return;
        }
        if (data.type === "answer" && state.peerConnection) {
          if (data.callId && state.activeCallId && data.callId !== state.activeCallId) return;
          if (state.callRetryTimer) clearInterval(state.callRetryTimer);
          state.callRetryTimer = null;
          await state.peerConnection.setRemoteDescription(data.answer);
          await flushPendingIce();
          $("callStatus").textContent = "Conectado";
          return;
        }
        if (data.type === "ice" && data.candidate) {
          if (state.peerConnection?.remoteDescription) {
            await state.peerConnection.addIceCandidate(data.candidate).catch(() => {});
          } else {
            state.pendingIce.push(data.candidate);
          }
          return;
        }
        if (data.type === "decline") {
          if (state.callRetryTimer) clearInterval(state.callRetryTimer);
          state.callRetryTimer = null;
          toast("Chamada recusada.");
          window.endCall(false);
          return;
        }
        if (data.type === "hang") {
          toast("Chamada encerrada.");
          window.endCall(false);
        }
      }

      window.hideContact = async (index) => {
        const room = state.rooms[index];
        if (!room || !confirm("Apagar contato desta lista? A sala segura pode ser restaurada pelo ID.")) return;

      function qrUrl(value) {
        return "https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=10&data=" + encodeURIComponent("arcaidron://user/" + value);
      }
      function drawFakeQr(canvas, text) {
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, 156, 156);
        ctx.fillStyle = "#001326";
        let seed = 0;
        for (const ch of text) seed += ch.charCodeAt(0);
        for (let y = 0; y < 13; y++) {
          for (let x = 0; x < 13; x++) {
            if ((x < 3 && y < 3) || (x > 9 && y < 3) || (x < 3 && y > 9) || ((x * 17 + y * 31 + seed) % 5 < 2)) {
              ctx.fillRect(12 + x * 10, 12 + y * 10, 8, 8);
            }
          }
        }
      }

      window.showAboutSettings = () => showModal(`

      `);

      window.saveSetting = (key, value) => {
        localStorage.setItem("arca_" + key, String(value));

      window.setTheme = (theme) => {

      function showModal(html) {

      function iconGear() { return `<svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-1.9.3 1.7 1.7 0 0 0-.8 1.6V22H9v-.2a1.7 1.7 0 0 0-.8-1.6 1.7 1.7 0 0 0-1.9-.3l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3 14H2v-4h1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7l2-3.4.2.1a1.7 1.7 0 0 0 1.9-.3A1.7 1.7 0 0 0 9 1.8V2h6v-.2a1.7 1.7 0 0 0 .8 1.6 1.7 1.7 0 0 0 1.9.3l.2-.1 2 3.4-.1.1a1.7 1.7 0 0 0-.3 1.9A1.7 1.7 0 0 0 21 10h1v4h-1a1.7 1.7 0 0 0-1.6 1z"/></svg>`; }
